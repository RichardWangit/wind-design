<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設計風壓計算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/theme.css">
<script src="../shared/docx-lite.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; overflow-y: auto; }
</style>
</head>
<body>

<div id="calc-panel" style="max-width:900px;margin:0 auto;padding:20px 24px 32px;">

  <!-- Formula banner -->
  <div id="calc-formula-banner" style="background:var(--ink);color:var(--paper);border-radius:10px;padding:16px 22px;margin-bottom:16px;position:relative;overflow:hidden">
    <div style="position:absolute;right:-10px;bottom:-20px;font-size:100px;opacity:0.04;font-family:'Noto Serif TC',serif;font-weight:900;pointer-events:none">p</div>
    <div id="calc-formula-ref" style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--gold);margin-bottom:6px">請先在 F 區選擇計算公式</div>
    <div id="calc-formula-display" style="font-size:16px;font-weight:700;letter-spacing:.04em;font-family:'Noto Serif TC',serif">—</div>
    <div id="calc-formula-note" style="font-size:11px;color:rgba(245,240,232,0.5);margin-top:6px"></div>
  </div>

  <!-- Auto-fill notice -->
  <div id="calc-notice" style="background:#f0f7ff;border:1px solid #c7d7f5;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:#1a4080;display:flex;align-items:center;gap:8px">
    <span>💡</span><span id="calc-notice-text">請先在 F 區選擇設計公式，S 區將依所選公式自動調整計算參數。</span>
  </div>

  <!-- Parameter grid -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px" id="param-grid"></div>

  <!-- Calc button -->
  <div style="display:flex;gap:10px;margin-bottom:14px">
    <button onclick="runCalc()" style="flex:1;padding:12px;background:var(--accent8,#5a2d82);color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:.06em;transition:opacity .2s" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">⚡ 計算設計風壓</button>
    <button onclick="resetCalc()" style="padding:12px 18px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='transparent'">↺ 重設</button>
  </div>

  <!-- Export button (hidden until calc completes) -->
  <div id="export-btn-container" style="display:none;margin-bottom:24px">
    <button onclick="exportDocx()"
      style="width:100%;padding:11px;background:transparent;color:var(--accent8,#5a2d82);
             border:1.5px solid var(--accent8,#5a2d82);border-radius:8px;font-size:13px;
             font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;
             letter-spacing:.06em;transition:all .2s"
      onmouseover="this.style.background='rgba(90,45,130,.09)'"
      onmouseout="this.style.background='transparent'">↓ 匯出計算書 (.docx)</button>
  </div>

  <!-- Result output -->
  <div id="calc-result"></div>
</div>

<script>
// ── Hub results cache (populated via postMessage from hub) ────────
let _hubResults = {};
let _lastBuiltFormulaCode = null;
let _calcSnapshot = null;  // 計算完成後的完整快照，供匯出使用

// ── postMessage bridge ────────────────────────────────────────────
window.addEventListener('message', function(e) {
  if (!e.data || typeof e.data !== 'object') return;
  // Hub sends all cached results as a map
  if (e.data.source === 'hub_to_sec_s_results') {
    _hubResults = e.data.results || {};
    buildParamGrid();
  }
  // Hub relays formula selection from frame-f
  if (e.data.source === 'wind_pressure_formula') {
    // Store as formula result so getActiveFormula can find it
    if (e.data.formulas) _hubResults['formula'] = e.data;
    buildParamGrid();
  }
});

// ── Adapter: read from local cache instead of hub results array ───
function getResultByType(type) {
  return _hubResults[type] || null;
}

function getActiveFormula() {
  const fd = _hubResults['formula'];
  if (!fd || !fd.formulas) return null;
  const mainFormulas = fd.formulas.filter(f => !f.isExtra);
  if (!mainFormulas.length) return null;
  if (fd.selectedFormulaCode) {
    const match = mainFormulas.find(f => f.code === fd.selectedFormulaCode);
    if (match) return match;
  }
  return mainFormulas[0];
}

// ── Calc logic (ported from hub.js S-section) ────────────────────
const FORMULA_CONFIGS = {
  '2.1': {
    name:'封閉/部分封閉式普通建築物 MWFRS',
    display:'p = q(z) · G · Cp − qi · (GCpi)',
    note:'q：迎風面取q(z)，其餘取q(h)；qi：封閉式取q(h)',
    gLabel:'G  陣風反應因子（普通建築物）',
    gHint:'普通建築物可取 1.88',
    useGf: false, useAc: false, useCpn: false, useCf: false, useGCp: false,
    hasCp: true, hasGCpi: true,
  },
  '2.2': {
    name:'封閉/部分封閉式柔性建築物 MWFRS',
    display:'p = q(z) · Gf · Cp − qi · (GCpi)',
    note:'Gf 為柔性建築物陣風反應因子，須依公式(2.9)計算',
    gLabel:'Gf  陣風反應因子（柔性建築物）',
    gHint:'柔性建築物，須依公式(2.9)計算',
    useGf: true, useAc: false, useCpn: false, useCf: false, useGCp: false,
    hasCp: true, hasGCpi: true,
  },
  '2.3': {
    name:'屋頂女兒牆設計風壓 (MWFRS)',
    display:'pp = qp · (GCpn)',
    note:'迎風面女兒牆：(GCpn)=+1.8；背風面女兒牆：(GCpn)=−1.1',
    gLabel:null,
    useGf: false, useAc: false, useCpn: true, useCf: false, useGCp: false,
    hasCp: false, hasGCpi: false,
  },
  '2.4': {
    name:'開放式建築物設計風力',
    display:'F = q(zAc) · G · Cf · Ac',
    note:'q(zAc) 為受風面積 Ac 形心高度處之風速壓',
    gLabel:'G  陣風反應因子（普通建築物）',
    gHint:'普通建築物可取 1.88',
    useGf: false, useAc: true, useCpn: false, useCf: true, useGCp: false,
    hasCp: false, hasGCpi: false,
  },
  '3.1': {
    name:'局部構材設計風壓（高度 ≤ 18m）',
    display:'p = q(h) · [(GCp) − (GCpi)]',
    note:'q(h) 為平均屋頂高度處之風速壓；(GCp)含陣風因子，不可分離',
    gLabel:null,
    useGf: false, useAc: false, useCpn: false, useCf: false, useGCp: true,
    hasCp: false, hasGCpi: true,
  },
  '3.2': {
    name:'局部構材設計風壓（高度 > 18m）',
    display:'p = q · (GCp) − qi · (GCpi)',
    note:'迎風面取q(z)，其餘取q(h)；(GCp)含陣風因子',
    gLabel:null,
    useGf: false, useAc: false, useCpn: false, useCf: false, useGCp: true,
    hasCp: false, hasGCpi: true,
  },
  '3.3': {
    name:'屋頂女兒牆局部構材設計風壓 (C&C)',
    display:'p = qp · [(GCp) − (GCpi)]',
    note:'qp 為女兒牆頂端高度處之風速壓',
    gLabel:null,
    useGf: false, useAc: false, useCpn: false, useCf: false, useGCp: true,
    hasCp: false, hasGCpi: true,
  },
  '3.4': {
    name:'開放式建築物斜屋頂局部構材設計風壓',
    display:'p = q(h) · G · Cpn',
    note:'Cpn 為淨風壓係數（見圖3.3）',
    gLabel:'G  陣風反應因子（普通建築物）',
    gHint:'普通建築物可取 1.88',
    useGf: false, useAc: false, useCpn: true, useCf: false, useGCp: false,
    hasCp: false, hasGCpi: false,
  },
};

// ── 建立參數格子 ──────────────────────────────────────────────────
function buildParamGrid() {
  const formula = getActiveFormula();
  const cfg = formula ? FORMULA_CONFIGS[formula.code] : null;

  // Update banner
  const bannerRef = document.getElementById('calc-formula-ref');
  const bannerDisp = document.getElementById('calc-formula-display');
  const bannerNote = document.getElementById('calc-formula-note');
  const noticeText = document.getElementById('calc-notice-text');
  if (cfg) {
    bannerRef.textContent  = formula.code + ' · ' + cfg.name;
    bannerDisp.textContent = cfg.display;
    bannerNote.textContent = cfg.note;
    noticeText.textContent = '系統已從查詢結果暫存區自動帶入已有參數，紅框欄位需手動填寫。';
  } else {
    bannerRef.textContent  = '請先在 F 區選擇設計公式';
    bannerDisp.textContent = '—';
    bannerNote.textContent = '';
    noticeText.textContent = '請先在 F 區選擇設計公式，S 區將依所選公式自動調整計算參數。';
  }

  const newFormulaCode = formula ? formula.code : null;

  const grid = document.getElementById('param-grid');
  if (!grid) return;
  grid.innerHTML = '';

  // 只在公式改變時清除計算結果；公式相同則保留，避免切換回 S 區時結果消失
  if (newFormulaCode !== _lastBuiltFormulaCode) {
    document.getElementById('calc-result').innerHTML = '';
    _lastBuiltFormulaCode = newFormulaCode;
  }

  // Gather base values from other sections
  const wa = getResultByType('wind');
  const wb = getResultByType('occ');
  const wc = getResultByType('terr');
  const wd = getResultByType('kzt');
  const we = getResultByType('wind-press');

  const vals = {};
  const wg = getResultByType('gust');
  const w0 = getResultByType('zone0');

  if (wa) vals.V10C = wa.speed;
  if (wb) vals.I    = wb.importanceFactor;
  if (wc && wc.parameters) {
    const pa = wc.parameters.find(p => p.symbol === 'α');
    const pg = wc.parameters.find(p => p.symbol === 'zg');
    if (pa) vals.alpha = pa.value;
    if (pg) vals.zg    = pg.value;
  }
  if (wd) vals.Kzt = wd.results.Kzt;
  if (wg) vals.G = wg.value;   // G 或 Gf，統一存 vals.G

  // 0 區全域設定自動帶入
  if (w0) {
    if (w0.z_max !== undefined && w0.z_max !== '') vals.z     = w0.z_max;
    if (w0.z_min !== undefined && w0.z_min !== '') vals.z_min = w0.z_min;
    if (w0.L     !== undefined && w0.L     !== '') vals.L     = w0.L;
    if (w0.B     !== undefined && w0.B     !== '') vals.B     = w0.B;
    if (w0.h     !== undefined && w0.h     !== '') vals.h     = w0.h;
  }
  if (we && we.coefficients) {
    we.coefficients.forEach(c => {
      if (c.coef === '+GCpi' && vals.GCpi_pos === undefined) vals.GCpi_pos = c.value;
      if (c.coef === '-GCpi' && vals.GCpi_neg === undefined) vals.GCpi_neg = c.value;
    });
    // Cp / GCp / Cf faces（排除 GCpi 及乘積項）
    vals.faces = we.coefficients.filter(c =>
      typeof c.value === 'number' &&
      c.coef !== '+GCpi' && c.coef !== '-GCpi' &&
      !c.coef.includes('×')
    );
    // Cpn faces（E區圖3.3查詢結果，供公式3.4使用）
    vals.cpnFaces = we.coefficients.filter(c =>
      typeof c.value === 'number' &&
      (c.coef === 'Cpn 負壓' || c.coef === 'Cpn 正壓')
    );
  }

  // ── Define which param cells to show depending on formula ──
  const BASE = [
    {key:'V10C',  label:'V₁₀(C)  基本設計風速',   unit:'m/s', src:'A區',  val:vals.V10C},
    {key:'I',     label:'I  用途係數',             unit:'—',   src:'B區',  val:vals.I},
    {key:'alpha', label:'α  風速垂直分布指數',      unit:'—',   src:'C區',  val:vals.alpha},
    {key:'zg',    label:'zg  梯度高度',            unit:'m',   src:'C區',  val:vals.zg},
    {key:'Kzt',   label:'Kzt  地形係數',           unit:'—',   src:'D區',  val:vals.Kzt},
    {key:'z',     label:'z  最高計算高度 (z_max)',  unit:'m',   src: vals.z != null ? '0區' : '手動', val:vals.z != null ? vals.z : null},
    {key:'z_min', label:'z_min  最低計算高度',      unit:'m',   src: vals.z_min != null ? '0區' : '手動', val:vals.z_min != null ? vals.z_min : null},
    {key:'L',     label:'L  順風向建物尺寸',        unit:'m',   src: vals.L != null ? '0區' : '手動', val:vals.L != null ? vals.L : null},
    {key:'B',     label:'B  垂直風向建物尺寸',      unit:'m',   src: vals.B != null ? '0區' : '手動', val:vals.B != null ? vals.B : null},
  ];

  if (!cfg) {
    // No formula selected: show base params grayed
    BASE.forEach(d => addParamCell(grid, d));
    return;
  }

  // Always show base params
  BASE.forEach(d => {
    if (d.key === 'Kzt') {
      addKztParamCell(grid, d, wd);
    } else {
      addParamCell(grid, d);
    }
  });

  // G / Gf
  if (cfg.gLabel) {
    const gVal = vals.G != null ? vals.G : null;
    const gSrc = gVal != null ? 'G區' : '手動';
    addParamCell(grid, {
      key: 'G',
      label: cfg.gLabel,
      unit: '—', src: gSrc, val: gVal,
      hint: gVal != null ? null : cfg.gHint
    });
  }

  // GCpi (for formulas with internal pressure)
  if (cfg.hasGCpi) {
    addParamCell(grid, {key:'GCpi_pos', label:'(GCpi)₊  正內風壓係數', unit:'—', src:'E區', val:vals.GCpi_pos});
    addParamCell(grid, {key:'GCpi_neg', label:'(GCpi)₋  負內風壓係數', unit:'—', src:'E區', val:vals.GCpi_neg});
  }

  // Ac for open building
  if (cfg.useAc) {
    addParamCell(grid, {key:'Ac', label:'Ac  受風特徵面積', unit:'m²', src:'手動', val:null, hint:'受風作用特徵面積'});
  }

  // Wind face Cp/Cf/GCp cells
  const faceLabel = cfg.useGCp ? '(GCp) 外風壓係數（含陣風因子）' :
                    cfg.useCf  ? 'Cf  風力係數' :
                    cfg.useCpn ? 'Cpn  淨風壓係數' :
                    cfg.hasCp  ? 'Cp  外風壓係數' : null;

  if (faceLabel) {
    const faceSection = document.createElement('div');
    faceSection.style.cssText = 'grid-column:1/-1;margin-top:4px;';
    const hasFaces = vals.faces && vals.faces.length > 0;
    faceSection.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);margin-bottom:10px">
      ${hasFaces ? '各風面係數（E區自動）' : '各風面係數（請手動填寫）'}</div>`;
    grid.appendChild(faceSection);

    const faceGrid = document.createElement('div');
    faceGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;grid-column:1/-1;';
    faceGrid.id = 'face-grid';

    if (hasFaces && (cfg.hasCp || cfg.useGCp || cfg.useCf)) {
      vals.faces.forEach((f, idx) => {
        addFaceCell(faceGrid, idx, f.face, f.coef, f.value);
      });
    } else if (cfg.useCpn && formula.code === '2.3') {
      // 公式2.3（屋頂女兒牆 MWFRS）：固定使用規範值
      addFaceCell(faceGrid, 0, '迎風面女兒牆', 'GCpn', 1.8,  true);
      addFaceCell(faceGrid, 1, '背風面女兒牆', 'GCpn', -1.1, true);
    } else if (cfg.useCpn) {
      // 公式3.4（開放式建築物斜屋頂）：從E區圖3.3查詢結果取 Cpn，若無則顯示空白輸入格
      const cpnFaces = vals.cpnFaces || [];
      if (cpnFaces.length > 0) {
        cpnFaces.forEach((f, idx) => {
          addFaceCell(faceGrid, idx, f.face + '（' + f.coef + '）', 'Cpn', f.value, false);
        });
      } else {
        addFaceCell(faceGrid, 0, '區域（請先查詢 E 區圖3.3 Cpn）', 'Cpn', null, false);
      }
    } else {
      [['迎風面','Cp'],['背風面','Cp'],['側風面','Cp']].forEach((f, idx) => {
        addFaceCell(faceGrid, idx, f[0], f[1], null, false);
      });
    }
    grid.appendChild(faceGrid);
  }
}

function addKztParamCell(grid, {key, label, unit, src, val}, wdResult) {
  const kztTable = wdResult && wdResult.results && wdResult.results.kztTable;
  const hasTable = kztTable && kztTable.length > 1;
  const has = val !== undefined && val !== null;
  const cell = document.createElement('div');
  cell.style.cssText = 'background:var(--card-bg);border:1.5px solid '
    + (has ? 'var(--border)' : 'var(--accent)')
    + ';border-radius:8px;padding:10px 12px;'
    + (hasTable ? 'grid-column:1/-1;' : '');
  const autoBadge = `<span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;background:rgba(44,122,75,.12);color:var(--accent3);border-radius:4px;padding:1px 6px;margin-left:5px">D區自動</span>`;
  const missBadge = `<span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;background:rgba(192,57,43,.12);color:var(--accent);border-radius:4px;padding:1px 6px;margin-left:5px">缺少</span>`;
  const hiddenInput = `<input type="number" step="any" id="cinp_Kzt" value="${has ? val : ''}" style="display:none">`;
  if (hasTable) {
    const tableRows = kztTable.map(row =>
      `<tr>
        <td style="padding:3px 8px;font-family:'DM Mono',monospace;font-size:11px;text-align:right;color:var(--muted)">${row.z}</td>
        <td style="padding:3px 8px;font-family:'DM Mono',monospace;font-size:11px;text-align:right;color:var(--accent5);font-weight:700">${row.Kzt.toFixed(4)}</td>
      </tr>`
    ).join('');
    cell.innerHTML = `
      <div style="font-size:10px;font-weight:600;color:var(--ink);margin-bottom:6px;display:flex;align-items:center;flex-wrap:wrap;gap:3px">
        ${label} <span style="color:var(--muted);font-size:9px">(${unit})</span>${autoBadge}
        <span style="margin-left:auto;font-size:9px;color:var(--muted)">代表值（z_max）= <strong style="color:var(--accent5)">${has ? parseFloat(val).toFixed(4) : '—'}</strong></span>
      </div>
      <div style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:6px">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:rgba(46,122,138,.08);position:sticky;top:0">
            <th style="padding:4px 8px;font-size:9px;color:var(--muted);text-align:right;border-bottom:1px solid var(--border)">z (m)</th>
            <th style="padding:4px 8px;font-size:9px;color:var(--accent5);text-align:right;border-bottom:1px solid var(--border)">Kzt</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      ${hiddenInput}`;
  } else {
    cell.innerHTML = `
      <div style="font-size:10px;font-weight:600;color:var(--ink);margin-bottom:5px;display:flex;align-items:center;flex-wrap:wrap;gap:3px">
        ${label} <span style="color:var(--muted);font-size:9px">(${unit})</span>${has ? autoBadge : missBadge}
      </div>
      <input type="number" step="any" id="cinp_Kzt"
        value="${has ? val : ''}"
        placeholder="${has ? '' : '請手動輸入'}"
        style="width:100%;padding:7px 10px;border:1.5px solid ${has ? 'var(--border)' : 'var(--accent)'};
          border-radius:6px;font-size:13px;font-family:'DM Mono',monospace;
          background:${has ? '#fff' : '#fff8f6'};outline:none;color:var(--ink)"
        onfocus="this.style.borderColor='var(--accent8,#5a2d82)'"
        onblur="this.style.borderColor='${has ? 'var(--border)' : 'var(--accent)'}'">`;
  }
  grid.appendChild(cell);
}

function addParamCell(grid, {key, label, unit, src, val, hint}) {
  const has  = val !== undefined && val !== null;
  const auto = src !== '手動';
  const cell = document.createElement('div');
  cell.style.cssText = 'background:var(--card-bg);border:1.5px solid ' + (has ? 'var(--border)' : 'var(--accent)') + ';border-radius:8px;padding:10px 12px;';
  const srcBadge = `<span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;`
    + `background:${has ? (auto ? 'rgba(44,122,75,.12)' : 'rgba(90,45,130,.12)') : 'rgba(192,57,43,.12)'};`
    + `color:${has ? (auto ? 'var(--accent3)' : 'var(--accent8,#5a2d82)') : 'var(--accent)'};`
    + `border-radius:4px;padding:1px 6px;margin-left:5px">`
    + `${has ? (auto ? src + '自動' : '手動') : '缺少'}</span>`;
  cell.innerHTML = `
    <div style="font-size:10px;font-weight:600;color:var(--ink);margin-bottom:5px;display:flex;align-items:center;flex-wrap:wrap;gap:3px">
      ${label} <span style="color:var(--muted);font-size:9px">(${unit})</span>${srcBadge}
    </div>
    <input type="number" step="any" id="cinp_${key}"
      value="${has ? val : ''}"
      placeholder="${hint || (has ? '' : '請手動輸入')}"
      style="width:100%;padding:7px 10px;border:1.5px solid ${has ? 'var(--border)' : 'var(--accent)'};
        border-radius:6px;font-size:13px;font-family:'DM Mono',monospace;
        background:${has ? '#fff' : '#fff8f6'};outline:none;color:var(--ink)"
      onfocus="this.style.borderColor='var(--accent8,#5a2d82)'"
      onblur="this.style.borderColor='${has ? 'var(--border)' : 'var(--accent)'}'">`;
  grid.appendChild(cell);
}

function addFaceCell(grid, idx, faceName, coefLabel, val, isFixed) {
  const has = val !== undefined && val !== null;
  const cell = document.createElement('div');
  cell.style.cssText = 'background:var(--card-bg);border:1.5px solid ' + (has ? 'var(--border)' : 'var(--accent)') + ';border-radius:8px;padding:10px 12px;';
  const srcBadge = !has
    ? `<span style="font-size:8px;background:rgba(192,57,43,.12);color:var(--accent);border-radius:4px;padding:1px 5px;font-family:'DM Mono',monospace;margin-left:4px">缺少</span>`
    : isFixed
      ? `<span style="font-size:8px;background:rgba(26,82,118,.12);color:var(--accent2);border-radius:4px;padding:1px 5px;font-family:'DM Mono',monospace;margin-left:4px">規範值</span>`
      : `<span style="font-size:8px;background:rgba(44,122,75,.12);color:var(--accent3);border-radius:4px;padding:1px 5px;font-family:'DM Mono',monospace;margin-left:4px">E區自動</span>`;
  cell.innerHTML = `
    <div style="font-size:10px;font-weight:600;color:var(--ink);margin-bottom:5px;display:flex;align-items:center;gap:4px">
      ${faceName} <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">(${coefLabel})</span>${srcBadge}
    </div>
    <input type="number" step="any" id="cinp_face_${idx}"
      value="${has ? val : ''}"
      data-face="${faceName}" data-coef="${coefLabel}"
      placeholder="${has ? '' : '請輸入 ' + coefLabel}"
      ${isFixed ? 'readonly' : ''}
      style="width:100%;padding:7px 10px;border:1.5px solid ${has ? 'var(--border)' : 'var(--accent)'};
        border-radius:6px;font-size:13px;font-family:'DM Mono',monospace;
        background:${isFixed ? '#f0f4f8' : (has ? '#fff' : '#fff8f6')};outline:none;color:var(--ink);
        ${isFixed ? 'cursor:default;' : ''}"
      onfocus="${isFixed ? '' : "this.style.borderColor='var(--accent8,#5a2d82)'"}"
      onblur="${isFixed ? '' : "this.style.borderColor='" + (has ? 'var(--border)' : 'var(--accent)') + "'"}">`;
  grid.appendChild(cell);
}

function getInputVal(key) {
  const el = document.getElementById('cinp_' + key);
  return el ? parseFloat(el.value) : NaN;
}

function getFaceInputs() {
  return Array.from(document.querySelectorAll('[id^="cinp_face_"]'))
    .map(el => ({face: el.dataset.face, coef: el.dataset.coef, value: parseFloat(el.value)}))
    .filter(f => !isNaN(f.value));
}

// ── Main calculation ──────────────────────────────────────────────
function runCalc() {
  const formula = getActiveFormula();
  const cfg = formula ? FORMULA_CONFIGS[formula.code] : null;
  const out = document.getElementById('calc-result');

  if (!cfg) {
    out.innerHTML = `<div style="background:#fff2f0;border:1px solid var(--accent);border-radius:8px;padding:14px 16px;color:var(--accent);font-size:13px">⚠ 請先在 F 區選擇設計公式</div>`;
    return;
  }

  const V   = getInputVal('V10C');
  const I   = getInputVal('I');
  const alp = getInputVal('alpha');
  const zg  = getInputVal('zg');
  const Kzt = getInputVal('Kzt');
  // 取得 kztTable 以顯示 Kzt_min
  const _kztData = _hubResults['kzt'];
  const _kztTable = (_kztData && _kztData.results && _kztData.results.kztTable && _kztData.results.kztTable.length > 1)
    ? _kztData.results.kztTable : null;
  const Kzt_min = _kztTable ? _kztTable[0].Kzt : Kzt;
  const z   = getInputVal('z');
  const z_min = getInputVal('z_min');
  const L   = getInputVal('L');
  const B   = getInputVal('B');
  const G   = cfg.gLabel ? getInputVal('G') : NaN;
  const GCpi_pos = cfg.hasGCpi ? getInputVal('GCpi_pos') : 0;
  const GCpi_neg = cfg.hasGCpi ? getInputVal('GCpi_neg') : 0;
  const Ac  = cfg.useAc ? getInputVal('Ac') : NaN;
  const faces = getFaceInputs();

  // Validate
  const missing = [];
  if (isNaN(V))   missing.push('V₁₀(C)');
  if (isNaN(I))   missing.push('I');
  if (isNaN(alp)) missing.push('α');
  if (isNaN(zg))  missing.push('zg');
  if (isNaN(Kzt)) missing.push('Kzt');
  if (isNaN(z) || z < 0) missing.push('z（最高計算高度）');
  if (cfg.gLabel && isNaN(G)) missing.push(cfg.useGf ? 'Gf' : 'G');
  if (cfg.hasGCpi && isNaN(GCpi_pos)) missing.push('(GCpi)₊');
  if (cfg.hasGCpi && isNaN(GCpi_neg)) missing.push('(GCpi)₋');
  if (cfg.useAc && isNaN(Ac)) missing.push('Ac');
  if ((cfg.hasCp || cfg.useGCp || cfg.useCf || cfg.useCpn) && faces.length === 0) missing.push('至少一個風面係數');

  if (missing.length) {
    out.innerHTML = `<div style="background:#fff2f0;border:1px solid var(--accent);border-radius:8px;padding:14px 16px;color:var(--accent);font-size:13px">⚠ 缺少以下參數：<strong>${missing.join('、')}</strong></div>`;
    return;
  }

  const f4 = n => typeof n === 'number' ? n.toFixed(4) : n;
  const f2 = n => typeof n === 'number' ? n.toFixed(2) : n;
  const signed = n => (n >= 0 ? '+' : '') + f2(n);
  const Gval = cfg.gLabel ? G : null;
  const GLabel = cfg.useGf ? 'Gf' : 'G';

  // ── Step 1: K(z) at z_max = h（迎風面最高點）──
  const zCalc = Math.max(z, 5);
  const Kz = 2.774 * Math.pow(zCalc / zg, 2 * alp);
  const Kz_note = z < 5 ? `（z=${z}m<5m，取5m）` : '';

  // ── Step 2: q(z_max) = q(h)，用於背風/側牆及 qi ──
  const qz = 0.06 * Kz * Kzt * I * V * I * V;
  const qi = qz; // qi = q(h) = q(z_max)，規範規定

  // ── Formula-specific step label ──
  const stepRow = (num, label, formula_expr, result, unit='') => `
    <div style="display:grid;grid-template-columns:24px 1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--paper);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${num}</div>
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--ink);margin-bottom:2px">${label}</div>
        <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);line-height:1.6">${formula_expr}</div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--accent8,#5a2d82);white-space:nowrap;text-align:right">${result} <span style="font-size:10px;color:var(--muted)">${unit}</span></div>
    </div>`;

  const paramRow = (sym, desc, val, unit, src) => `
    <tr>
      <td style="padding:5px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent8,#5a2d82);font-weight:700;white-space:nowrap">${sym}</td>
      <td style="padding:5px 8px;font-size:11px;color:var(--ink)">${desc}</td>
      <td style="padding:5px 8px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--ink);text-align:right">${val}</td>
      <td style="padding:5px 8px;font-size:10px;color:var(--muted)">${unit}</td>
      <td style="padding:5px 8px"><span style="font-size:8px;background:rgba(90,45,130,.1);color:var(--accent8,#5a2d82);border-radius:3px;padding:1px 5px;font-family:'DM Mono',monospace">${src}</span></td>
    </tr>`;

  // ── Per-formula calculation ──────────────────────────────────────
  let commonSteps = `
    ${stepRow(1,
      '風速壓地況係數 K(z_max)',
      `K(z) = 2.774 × (z / z<sub>g</sub>)<sup>(2α)</sup><br><span style="opacity:.7">= 2.774 × (${zCalc} / ${f2(zg)})<sup>(2×${alp})</sup> ${Kz_note}</span>`,
      f4(Kz), '—')}
    ${stepRow(2,
      '風速壓 q(h) = q(z_max)（qi 及背風面基準）',
      `q(h) = 0.06 × K(z) × K<sub>zt</sub> × (I · V)<sup>2</sup><br><span style="opacity:.7">= 0.06 × ${f4(Kz)} × ${f4(Kzt)} × [${f4(I)} × ${f2(V)}]²</span>`,
      f2(qz), 'kgf/m²')}`;

  let faceResultsHTML = '';
  let finalHTML = '';
  let roofForceHTML = '';

  // 計算快照暫存（供匯出 DOCX 使用）
  let _snapFormulaResults = null;
  let _snapPerHeightRows  = null;
  let _snapTpcRows        = null;
  let _snapRoofForceType  = null;
  let _snapRoofForceData  = null;

  // 取得 E 區構件資訊（供後續條件判斷使用）
  const weCalc = getResultByType('wind-press');

  // ── 2.1 / 2.2 ────────────────────────────────────────────────────
  if (formula.code === '2.1' || formula.code === '2.2') {
    // 各風面設計風壓（以 z_max 為代表高度）
    const faceResults = faces.map(f => {
      // 迎風面(Cp>0)用q(z)=q(z_max)；背風/側牆(Cp<0)用q(h)=q(z_max)；此處均用qz=q(z_max)
      const p_pos = qz * G * f.value - qi * GCpi_pos;
      const p_neg = qz * G * f.value - qi * GCpi_neg;
      const p_ctrl = Math.abs(p_pos) >= Math.abs(p_neg) ? p_pos : p_neg;
      return {...f, p_pos, p_neg, p_ctrl};
    });
    const allPos = faceResults.map(r => Math.max(r.p_pos, r.p_neg));
    const allNeg = faceResults.map(r => Math.min(r.p_pos, r.p_neg));
    const hasPos = allPos.some(v => v > 0), hasNeg = allNeg.some(v => v < 0);
    const maxPos = Math.max(...allPos), minNeg = Math.min(...allNeg);
    const maxPosFace = faceResults[allPos.indexOf(maxPos)];
    const minNegFace = faceResults[allNeg.indexOf(minNeg)];

    _snapFormulaResults = faceResults;  // 快照
    faceResultsHTML = buildFaceTable(faceResults, formula.code, GLabel, f4(G), f2(qz), f4(GCpi_pos), f4(GCpi_neg));
    finalHTML = buildEnvelope(hasPos, hasNeg, maxPos, minNeg,
      maxPosFace.face+'（'+((maxPosFace.p_pos>=maxPosFace.p_neg)?'正':'負')+'內壓控制）',
      minNegFace.face+'（'+((minNegFace.p_pos<=minNegFace.p_neg)?'正':'負')+'內壓控制）');

    // ── 逐高度 q(z) 計算（規範：迎風面用q(z)，背風/側/屋頂用q(h)）──
    // 僅在 E 區選擇表2.4（牆）時才計算並顯示
    const hasZ_min = !isNaN(z_min) && z_min >= 0;
    const hasL     = !isNaN(L) && L > 0;
    const hasB     = !isNaN(B) && B > 0;
    const isWallComp = weCalc && weCalc.component === 'wall';
    if (hasZ_min && hasL && hasB && faces.length > 0 && isWallComp) {
      // 取得 kztTable 從 D 區結果
      const kztData = _hubResults['kzt'];
      const kztTable = (kztData && kztData.results && kztData.results.kztTable) ? kztData.results.kztTable : [];
      // 查表：在 kztTable 找 zi 對應的 Kzt（線性內插）
      function getKztAtZ(zi) {
        if (kztTable.length === 0) return Kzt; // fallback 到代表值
        if (zi <= kztTable[0].z)   return kztTable[0].Kzt;
        if (zi >= kztTable[kztTable.length-1].z) return kztTable[kztTable.length-1].Kzt;
        for (let k = 0; k < kztTable.length-1; k++) {
          const a = kztTable[k], b = kztTable[k+1];
          if (zi >= a.z && zi <= b.z) {
            const t = (zi - a.z) / (b.z - a.z);
            return a.Kzt + t * (b.Kzt - a.Kzt);
          }
        }
        return Kzt;
      }
      // 找最大正 Cp（迎風面）及最小負 Cp（背風/側面）
      const cpVals = faces.map(f => f.value);
      const max_Cp_pos = Math.max(...cpVals);  // 迎風面 Cp
      const min_Cp_neg = Math.min(...cpVals);  // 背風/側面 Cp（最負值）
      const faceWidth = Math.max(!isNaN(L)?L:0, !isNaN(B)?B:0);

      // q(h) 固定 = qz（已於 Step 2 計算）
      const q_h = qz;
      // p_neg 為常數（背風/側面使用 q(h)）
      const p_neg_const = q_h * G * min_Cp_neg - q_h * GCpi_pos;

      const perHeightRows = [];
      for (let zi = Math.floor(z_min); zi <= Math.ceil(z); zi++) {
        const zCalcI = Math.max(zi, 5);
        const KztI   = getKztAtZ(zi);
        const KzI    = 2.774 * Math.pow(zCalcI / zg, 2 * alp);
        const qzI    = 0.06 * KzI * KztI * I * V * I * V;
        // 迎風面用 q(zi)
        const p_pos_i = qzI * G * max_Cp_pos - q_h * GCpi_neg;
        // 背風/側面用 q(h)
        const p_neg_i = p_neg_const;
        perHeightRows.push({ z: zi, Kz: KzI, Kzt: KztI, qz: qzI, p_pos: p_pos_i, p_neg: p_neg_i, F_pos: null, F_neg: null });
      }
      // 梯形積分：單列時直接乘；多列時第1列不計，第2列起取前後平均壓力乘受風寬
      if (perHeightRows.length === 1) {
        perHeightRows[0].F_pos = faceWidth * perHeightRows[0].p_pos;
        perHeightRows[0].F_neg = faceWidth * perHeightRows[0].p_neg;
      } else {
        for (let i = 1; i < perHeightRows.length; i++) {
          const prev = perHeightRows[i - 1];
          const curr = perHeightRows[i];
          curr.F_pos = faceWidth * (prev.p_pos + curr.p_pos) / 2;
          curr.F_neg = faceWidth * (prev.p_neg + curr.p_neg) / 2;
        }
      }
      const totalFPos = perHeightRows.reduce((s, r) => s + (r.F_pos !== null ? r.F_pos : 0), 0);
      const totalFNeg = perHeightRows.reduce((s, r) => s + (r.F_neg !== null ? r.F_neg : 0), 0);
      _snapPerHeightRows = perHeightRows;  // 快照
      faceResultsHTML += buildPerHeightTable(perHeightRows, totalFPos, totalFNeg, faceWidth,
        max_Cp_pos, min_Cp_neg, z_min, z, GLabel);

      // ── 台電核能火力發電工程處修正風壓 ────────────────────────────────
      // z < 30m：風壓不得小於 240 kgf/m²；z ≥ 30m：風壓不得小於 360 kgf/m²
      const TPC_LOW = 240;
      const TPC_HIGH = 360;
      const tpcRows = perHeightRows.map(r => {
        const threshold = r.z < 30 ? TPC_LOW : TPC_HIGH;
        const p_pos_c = r.p_pos < threshold ? threshold : r.p_pos;
        const p_neg_c = Math.abs(r.p_neg) < threshold ? -threshold : r.p_neg;
        return {
          z: r.z, Kz: r.Kz, Kzt: r.Kzt, qz: r.qz,
          p_pos: p_pos_c, p_neg: p_neg_c,
          p_pos_orig: r.p_pos, p_neg_orig: r.p_neg,
          corrected_pos: r.p_pos < threshold,
          corrected_neg: Math.abs(r.p_neg) < threshold,
          threshold,
          F_pos: null, F_neg: null
        };
      });
      if (tpcRows.length === 1) {
        tpcRows[0].F_pos = faceWidth * tpcRows[0].p_pos;
        tpcRows[0].F_neg = faceWidth * tpcRows[0].p_neg;
      } else {
        for (let i = 1; i < tpcRows.length; i++) {
          const prev = tpcRows[i - 1];
          const curr = tpcRows[i];
          curr.F_pos = faceWidth * (prev.p_pos + curr.p_pos) / 2;
          curr.F_neg = faceWidth * (prev.p_neg + curr.p_neg) / 2;
        }
      }
      const tpcTotalFPos = tpcRows.reduce((s, r) => s + (r.F_pos !== null ? r.F_pos : 0), 0);
      const tpcTotalFNeg = tpcRows.reduce((s, r) => s + (r.F_neg !== null ? r.F_neg : 0), 0);
      _snapTpcRows = tpcRows;  // 快照
      faceResultsHTML += buildTpcCorrectedTable(tpcRows, tpcTotalFPos, tpcTotalFNeg, faceWidth, z_min, z);
    }

    // ── 表2.5 屋頂總受力（F = p × L × B / cosθ）────────────────────
    if (weCalc && weCalc.component === 'flat_roof' && !isNaN(L) && L > 0 && !isNaN(B) && B > 0) {
      const thetaInp = (weCalc.inputs || []).find(i => i.label === 'θ（屋面傾角）');
      const roofTheta = thetaInp ? parseFloat(thetaInp.value) : 0;
      const cosTheta = Math.cos(roofTheta * Math.PI / 180);
      const F_max = maxPos * L * B / cosTheta;
      const F_min = minNeg * L * B / cosTheta;
      _snapRoofForceType = 'flat';  // 快照
      _snapRoofForceData = { theta: roofTheta, cosTheta, L, B, F_max, F_min, maxPos, minNeg };
      roofForceHTML = `
      <div style="background:var(--card-bg);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px">
        <div style="background:var(--ink);color:var(--paper);padding:10px 16px;font-size:11px;font-weight:700;font-family:'Noto Serif TC',serif">屋頂總受力（表2.5）　F = p × L × B / cosθ</div>
        <div style="padding:8px 16px 4px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)">L = ${f2(L)} m　B = ${f2(B)} m　θ = ${roofTheta}°　cosθ = ${cosTheta.toFixed(4)}</div>
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
          <tr style="background:var(--paper)">
            <th style="padding:7px 10px;font-size:9px;text-align:left;color:var(--muted);border-bottom:1px solid var(--border)">計算工況</th>
            <th style="padding:7px 10px;font-size:9px;text-align:right;color:var(--muted);border-bottom:1px solid var(--border)">p (kgf/m²)</th>
            <th style="padding:7px 10px;font-size:9px;text-align:right;color:var(--muted);border-bottom:1px solid var(--border)">L × B / cosθ (m²)</th>
            <th style="padding:7px 10px;font-size:9px;text-align:right;color:var(--accent8,#5a2d82);border-bottom:1px solid var(--border)">F (kgf)</th>
          </tr>
          <tr>
            <td style="padding:8px 10px;font-size:11px">最大正設計值</td>
            <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;text-align:right;color:#16a34a">${signed(maxPos)}</td>
            <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;text-align:right">${f2(L * B / cosTheta)}</td>
            <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;text-align:right;color:${F_max>=0?'#16a34a':'#dc2626'}">${signed(F_max)}</td>
          </tr>
          <tr style="background:rgba(90,45,130,.04)">
            <td style="padding:8px 10px;font-size:11px">最小負設計值</td>
            <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;text-align:right;color:#dc2626">${signed(minNeg)}</td>
            <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;text-align:right">${f2(L * B / cosTheta)}</td>
            <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;text-align:right;color:${F_min>=0?'#16a34a':'#dc2626'}">${signed(F_min)}</td>
          </tr>
        </table></div>
      </div>`;
    }

    // ── 表2.6 屋頂總受力 ────────────────────────────────────────────
    // 迎風/背風面：F = (p × L × B / 4) × √(1+4r²)；中央部分：F = p × L × B / 2
    if (weCalc && weCalc.component === 'arch_roof' && !isNaN(L) && L > 0 && !isNaN(B) && B > 0) {
      const rInp = (weCalc.inputs || []).find(i => i.label === 'r（拱高/跨度）');
      const archR = rInp ? parseFloat(rInp.value) : NaN;
      if (!isNaN(archR) && archR > 0) {
        const archFactor = Math.sqrt(1 + 4 * archR * archR);
        _snapRoofForceType = 'arch';  // 快照
        _snapRoofForceData = { archR, archFactor, L, B };
        const fWind = faceResults.find(f => f.face.startsWith('迎風面 P'));
        const fCent = faceResults.find(f => f.face.startsWith('中央部分 Q'));
        const fLee  = faceResults.find(f => f.face.startsWith('背風面 P'));
        const makeArchRow = (label, faceData, area, factor) => {
          if (!faceData) return '';
          const p = faceData.p_ctrl;
          const F = p * area * (factor !== undefined ? factor : 1);

// ── Helper: face table for 2.1/2.2/3.2 ───────────────────────────
function buildFaceTable(faceResults, code, GLabel, Gval, qz, gp, gn) {
  const f2 = n => parseFloat(n).toFixed(2);
  const signed = n => (n>=0?'+':'')+parseFloat(n).toFixed(2);
  const allPos = faceResults.map(r=>Math.max(r.p_pos,r.p_neg));
  const allNeg = faceResults.map(r=>Math.min(r.p_pos,r.p_neg));
  const maxPos = Math.max(...allPos), minNeg = Math.min(...allNeg);
  const rows = faceResults.map((r,i) => {
    const isMaxPos = Math.max(r.p_pos,r.p_neg)===maxPos;
    const isMinNeg = Math.min(r.p_pos,r.p_neg)===minNeg;
    const tag = isMaxPos&&isMinNeg?' ▲▼':isMaxPos?' ▲':isMinNeg?' ▼':'';
    const hl  = (isMaxPos||isMinNeg)?'background:rgba(90,45,130,.07)':'';
    return `<tr style="${hl}"><td style="padding:8px 10px;font-size:11px;font-weight:${tag?700:400}">${r.face}</td>
      <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${r.coef}</td>
      <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;text-align:right">${parseFloat(r.value).toFixed(4)}</td>
      <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;text-align:right;color:#16a34a">${signed(r.p_pos)}</td>
      <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;text-align:right;color:#dc2626">${signed(r.p_neg)}</td>
      <td style="padding:8px 10px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;text-align:right;color:var(--accent8,#5a2d82)">${signed(r.p_ctrl)}</td>
      <td style="padding:8px 10px;font-size:9px;color:var(--muted)">${r.p_pos>=r.p_neg?'正內壓':'負內壓'}控制${tag}</td>
    </tr>`;
  }).join('');
  const formulaRow = code === '2.1' ? 'p = q(z)·G·Cp − qi·(GCpi)'
    : code === '2.2' ? 'p = q(z)·Gf·Cp − qi·(GCpi)'
    : 'p = q·(GCp) − qi·(GCpi)';
  return `<div style="background:var(--card-bg);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px">
    <div style="background:var(--ink);color:var(--paper);padding:10px 16px;font-size:11px;font-weight:700;font-family:'Noto Serif TC',serif">各風面設計風壓</div>
    <div style="padding:6px 16px;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);background:rgba(90,45,130,.06);border-bottom:1px solid var(--border);font-style:italic">${formulaRow}</div>
    <div style="padding:10px 16px 4px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">q(h)=${qz} kgf/m²（代表高度 z_max）　${GLabel}=${Gval}　(GCpi)₊=+${gp}　(GCpi)₋=${gn}</div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
      <tr style="background:var(--paper)">
        <th style="padding:7px 10px;font-size:9px;text-align:left;color:var(--muted);border-bottom:1px solid var(--border)">風面</th>
        <th style="padding:7px 10px;font-size:9px;text-align:left;color:var(--muted);border-bottom:1px solid var(--border)">係數</th>
        <th style="padding:7px 10px;font-size:9px;text-align:right;color:var(--muted);border-bottom:1px solid var(--border)">值</th>
        <th style="padding:7px 10px;font-size:9px;text-align:right;color:#16a34a;border-bottom:1px solid var(--border)">p₊</th>
        <th style="padding:7px 10px;font-size:9px;text-align:right;color:#dc2626;border-bottom:1px solid var(--border)">p₋</th>
        <th style="padding:7px 10px;font-size:9px;text-align:right;color:var(--accent8,#5a2d82);border-bottom:1px solid var(--border)">設計值</th>
        <th style="padding:7px 10px;font-size:9px;color:var(--muted);border-bottom:1px solid var(--border)">備註</th>
      </tr>${rows}
    </table></div>
    <div style="padding:8px 14px;font-size:10px;color:var(--muted);border-top:1px solid var(--border)">▲最大正設計值　▼最小負設計值　注：各風面以 q(h)=q(z_max) 計算</div>
  </div>`;
}

// ── 匯出 DOCX 計算書 ──────────────────────────────────────────────
function exportDocx() {
  if (!_calcSnapshot) { alert('請先完成設計風壓計算'); return; }

  const f2 = n => typeof n === 'number' ? n.toFixed(2) : String(n ?? '—');
  const f4 = n => typeof n === 'number' ? n.toFixed(4) : String(n ?? '—');
  const sv = v => (v !== undefined && v !== null && v !== '') ? String(v) : '—';
  const sg = n => typeof n === 'number' ? (n >= 0 ? '+' : '') + n.toFixed(2) : '—';

  const bld = new DocxLite.DocxBuilder();
  const hub = _calcSnapshot.hub;
  const inp = _calcSnapshot.inputs;
  const comp = _calcSnapshot.computed;

  // ── 封面 ──────────────────────────────────────────────────────
  bld.addTitle('建築風力設計計算書');
  bld.addPara('計算日期：' + new Date(_calcSnapshot.generatedAt).toLocaleString('zh-TW'), false, true);
  bld.addPara('適用公式：' + _calcSnapshot.formulaCode + '　' + _calcSnapshot.formulaDisplay, false, true);
  bld.addSpacer();

  // ── 一、建築物基本參數 ─────────────────────────────────────────
  bld.addH1('一、建築物基本參數');
  const z0 = hub['zone0'];
  if (z0) {
    const btL = { ordinary: '普通建築物', flexible: '柔性建築物' };
    const bfL = { enclosed: '封閉式', partial: '部分封閉式', open: '開放式' };
    const dsL = { mwfrs: 'MWFRS（主要抗風系統）', cc: 'C&C（局部構材）' };
    bld.addKvTable([
      ['建築物類型',      btL[z0.buildingType]  || z0.buildingType  || '—'],
      ['封閉狀態',        bfL[z0.buildingForm]  || z0.buildingForm  || '—'],
      ['設計系統',        dsL[z0.designSystem]  || z0.designSystem  || '—'],
      ['建築物高度 h',    z0.h    !== '' && z0.h    !== undefined ? z0.h    + ' m' : '—'],
      ['順風向尺寸 L',    z0.L    !== '' && z0.L    !== undefined ? z0.L    + ' m' : '—'],
      ['垂直風向尺寸 B',  z0.B    !== '' && z0.B    !== undefined ? z0.B    + ' m' : '—'],
      ['最低計算高度 z_min', z0.z_min !== '' && z0.z_min !== undefined ? z0.z_min + ' m' : '—'],
      ['最高計算高度 z_max', z0.z_max !== '' && z0.z_max !== undefined ? z0.z_max + ' m' : '—'],
    ]);
  } else { bld.addPara('（未輸入 0 區基本參數）'); }
  bld.addSpacer();

  // ── 二、基本設計風速 ───────────────────────────────────────────
  bld.addH1('二、基本設計風速');
  const wa = hub['wind'];
  if (wa) {
    bld.addKvTable([
      ['地區', [wa.island, wa.county, wa.township].filter(Boolean).join(' / ')],
      ['風區', wa.zone],
      ['基本設計風速 V\u2081\u2080(C)', wa.speed + ' m/s'],
    ]);
  } else { bld.addPara('（未查詢 A 區基本設計風速）'); }
  bld.addSpacer();

  // ── 三、建築物用途係數 ─────────────────────────────────────────
  bld.addH1('三、建築物用途係數');
  const wo = hub['occ'];
  if (wo) {
    const occRows = [
      ['用途分類',   wo.category],
      ['使用情形',   wo.itemDesc],
      ['回歸期',     wo.returnPeriod ? wo.returnPeriod + ' 年' : '—'],
      ['用途係數 I', wo.importanceFactor],
    ];
    if (wo.notes) occRows.push(['備註', wo.notes]);
    bld.addKvTable(occRows);
  } else { bld.addPara('（未查詢 B 區用途係數）'); }
  bld.addSpacer();

  // ── 四、地況種類及參數 ─────────────────────────────────────────
  bld.addH1('四、地況種類及參數');
  const wt = hub['terr'];
  if (wt) {
    bld.addKvTable([
      ['地況種類',   wt.terrainId],
      ['名稱',       wt.terrainName],
      ['說明',       wt.description],
      ['適用條件',   wt.applicationCondition],
    ]);
    if (wt.parameters && wt.parameters.length > 0) {
      bld.addSpacer();
      bld.addPara('地況參數：', true);
      bld.addMultiTable(
        ['符號', '名稱', '數值', '單位'],
        wt.parameters.map(p => [p.symbol, p.name, sv(p.value), p.unit])
      );
    }
  } else { bld.addPara('（未查詢 C 區地況種類）'); }
  bld.addSpacer();

  // ── 五、地形係數 Kzt ────────────────────────────────────────────
  bld.addH1('五、地形係數 Kzt');
  const wk = hub['kzt'];
  if (wk) {
    const kztRows = [['地形類型', wk.terrain || '—']];
    if (wk.inputs) {
      if (wk.inputs.H  != null) kztRows.push(['山丘高度 H',  wk.inputs.H  + ' m']);
      if (wk.inputs.Lh != null) kztRows.push(['水平距離 Lh', wk.inputs.Lh + ' m']);
      if (wk.inputs.x  != null) kztRows.push(['相對位置 x',  wk.inputs.x  + ' m']);
    }
    if (wk.results) {
      if (wk.results.K1) kztRows.push(['K1', f4(wk.results.K1)]);
      if (wk.results.K2) kztRows.push(['K2', f4(wk.results.K2)]);
      if (wk.results.K3) kztRows.push(['K3 (z_max)', f4(wk.results.K3)]);
      kztRows.push(['Kzt (z_max)', f4(wk.results.Kzt)]);
    }
    bld.addKvTable(kztRows);
    if (wk.results && wk.results.kztTable && wk.results.kztTable.length > 1) {
      bld.addSpacer();
      bld.addPara('逐高度 Kzt 計算表：', true);
      bld.addMultiTable(
        ['高度 z (m)', 'Kzt'],
        wk.results.kztTable.map(r => [r.z, f4(r.Kzt)])
      );
    }
  } else { bld.addPara('（未計算 D 區地形係數）'); }
  bld.addSpacer();

  // ── 六、建築物外風壓係數與內風壓係數 ──────────────────────────
  bld.addH1('六、建築物外風壓係數與內風壓係數');
  const we = hub['wind-press'];
  if (we) {
    bld.addKvTable([
      ['構件類型', we.componentLabel || we.component || '—'],
      ['查詢表格', we.tableRef || we.tableName || '—'],
    ]);
    if (we.inputs && we.inputs.length > 0) {
      bld.addSpacer();
      bld.addPara('查詢輸入：', true);
      bld.addKvTable(we.inputs.map(i => [i.label, sv(i.value)]));
    }
    if (we.coefficients && we.coefficients.length > 0) {
      bld.addSpacer();
      bld.addPara('風壓係數：', true);
      bld.addMultiTable(
        ['風面', '係數', '數值'],
        we.coefficients.map(c => [c.face, c.coef, f4(c.value)])
      );
    }
  } else { bld.addPara('（未查詢 E 區風壓係數）'); }
  bld.addSpacer();

  // ── 七、設計風壓計算式 ─────────────────────────────────────────
  bld.addH1('七、設計風壓計算式');
  const wf = hub['formula'];
  if (wf) {
    const fmRows = [
      ['建築物類型', wf.buildingType],
      ['封閉狀態',   wf.enclosureType],
      ['設計系統',   wf.designSystem],
    ];
    if (wf.subcategory) fmRows.push(['細類', wf.subcategory]);
    fmRows.push(['選用公式編號', wf.selectedFormulaCode]);
    const selF = (wf.formulas || []).find(f => f.code === wf.selectedFormulaCode);
    if (selF) {
      fmRows.push(['公式名稱',   selF.name]);
      fmRows.push(['適用條件',   selF.condition || '—']);
    }
    fmRows.push(['公式',   _calcSnapshot.formulaDisplay]);
    fmRows.push(['說明',   _calcSnapshot.formulaNote]);
    bld.addKvTable(fmRows);
  } else { bld.addPara('（未選擇 F 區設計公式）'); }
  bld.addSpacer();

  // ── 八、陣風反應因子 ───────────────────────────────────────────
  bld.addH1('八、陣風反應因子');
  const wg = hub['gust'];
  if (wg) {
    bld.addKvTable([
      ['建築物類型', wg.buildingType === 'flexible' ? '柔性建築物' : '普通建築物'],
      [wg.label || '陣風反應因子', String(wg.value)],
      ['說明', wg.desc],
    ]);
  } else if (inp.G !== null && inp.G !== undefined) {
    bld.addKvTable([
      [_calcSnapshot.GLabel || '陣風反應因子', f4(inp.G)],
      ['來源', '手動輸入'],
    ]);
  } else {
    bld.addPara('（本公式不使用陣風反應因子，或尚未查詢 G 區）');
  }
  bld.addSpacer();

  // ── 九、設計風壓計算 ───────────────────────────────────────────
  bld.addH1('九、設計風壓計算');

  // 9.1 使用參數彙整
  bld.addH2('9.1　使用參數彙整');
  const pRows = [
    ['V\u2081\u2080(C)  基本設計風速', f2(inp.V)  + ' m/s'],
    ['I  用途係數',          f4(inp.I)],
    ['\u03b1  風速垂直分布指數', f4(inp.alp)],
    ['zg  梯度高度',         f2(inp.zg) + ' m'],
    ['Kzt（z_max）',        f4(inp.Kzt)],
  ];
  if (inp.Kzt_min !== undefined && inp.Kzt_min !== inp.Kzt) {
    pRows.push(['Kzt（z_min）', f4(inp.Kzt_min)]);
  }
  pRows.push(['z_max  最高計算高度', f2(inp.z) + ' m']);
  if (!isNaN(inp.z_min)) pRows.push(['z_min  最低計算高度', f2(inp.z_min) + ' m']);
  if (!isNaN(inp.L))     pRows.push(['L  順風向尺寸',      f2(inp.L)     + ' m']);
  if (!isNaN(inp.B))     pRows.push(['B  垂直風向尺寸',    f2(inp.B)     + ' m']);
  if (inp.G !== null && inp.G !== undefined)
    pRows.push([_calcSnapshot.GLabel || '陣風反應因子', f4(inp.G)]);
  if (inp.GCpi_pos !== null && inp.GCpi_pos !== undefined) {
    pRows.push(['(GCpi)\u208a  正內風壓係數', '+' + f4(inp.GCpi_pos)]);
    pRows.push(['(GCpi)\u208b  負內風壓係數',       f4(inp.GCpi_neg)]);
  }
  if (inp.Ac !== null && inp.Ac !== undefined)
    pRows.push(['Ac  受風特徵面積', f2(inp.Ac) + ' m\u00b2']);
  bld.addKvTable(pRows);
  bld.addSpacer();

  // 9.2 計算步驟
  bld.addH2('9.2　計算步驟');
  const zCS = Math.max(inp.z, 5);
  const kzNote = inp.z < 5 ? '（z=' + inp.z + 'm < 5m，取5m）' : '';
  bld.addKvTable([
    ['步驟 1',   '風速壓地況係數 K(z_max)'],
    ['計算式',   'K(z) = 2.774 \u00d7 (z / zg)^(2\u03b1) = 2.774 \u00d7 (' + zCS + ' / ' + f2(inp.zg) + ')^(2\u00d7' + inp.alp + ') ' + kzNote],
    ['結果',     'K(z_max) = ' + f4(comp.Kz)],
    ['步驟 2',   '風速壓 q(h) = q(z_max)（qi 及背風面基準值）'],
    ['計算式',   'q(h) = 0.06 \u00d7 K(z) \u00d7 Kzt \u00d7 (I\u00b7V)\u00b2 = 0.06 \u00d7 ' + f4(comp.Kz) + ' \u00d7 ' + f4(inp.Kzt) + ' \u00d7 [' + f4(inp.I) + ' \u00d7 ' + f2(inp.V) + ']\u00b2'],
    ['結果',     'q(h) = ' + f2(comp.qz) + ' kgf/m\u00b2'],
  ]);
  bld.addSpacer();

  // 9.3 各風面設計風壓
  const fr = _calcSnapshot.formulaResults;
  const code = _calcSnapshot.formulaCode;
  if (fr && fr.length > 0) {
    bld.addH2('9.3　各風面設計風壓');
    if (code === '2.1' || code === '2.2' || code === '3.2') {
      bld.addMultiTable(
        ['風面', '係數', '係數值', 'p\u208a (kgf/m\u00b2)', 'p\u208b (kgf/m\u00b2)', '設計值 (kgf/m\u00b2)', '控制工況'],
        fr.map(r => [r.face, r.coef, f4(r.value), sg(r.p_pos), sg(r.p_neg), sg(r.p_ctrl),
          r.p_pos >= r.p_neg ? '正內壓控制' : '負內壓控制'])
      );
    } else if (code === '3.1' || code === '3.3') {
      bld.addMultiTable(
        ['風面', '(GCp)', 'p\u208a (kgf/m\u00b2)', 'p\u208b (kgf/m\u00b2)', '設計值 (kgf/m\u00b2)', '控制工況'],
        fr.map(r => [r.face, f4(r.value), sg(r.p_pos), sg(r.p_neg), sg(r.p_ctrl),
          r.p_pos >= r.p_neg ? '正內壓控制' : '負內壓控制'])
      );
    } else if (code === '2.3') {
      bld.addMultiTable(
        ['風面', '(GCpn)', 'pp (kgf/m\u00b2)'],
        fr.map(r => [r.face, f4(r.value), sg(r.pp)])
      );
    } else if (code === '2.4') {
      bld.addMultiTable(
        ['風面', 'Cf', 'F (kgf)'],
        fr.map(r => [r.face, f4(r.value), sg(r.F)])
      );
    } else if (code === '3.4') {
      bld.addMultiTable(
        ['風面', 'Cpn', 'p (kgf/m\u00b2)'],
        fr.map(r => [r.face, f4(r.value), sg(r.p)])
      );
    }
    bld.addSpacer();
  }

  // 9.4 逐高度設計風壓
  if (_calcSnapshot.perHeightRows && _calcSnapshot.perHeightRows.length > 0) {
    bld.addH2('9.4　逐高度設計風壓');
    bld.addPara('迎風面使用 q(z) 逐高度；背風/側面使用 q(h) 固定；F 以梯形積分計算（首列不計）');
    bld.addMultiTable(
      ['z (m)', 'K(z)', 'Kzt', 'q(z) (kgf/m\u00b2)', 'p\u208a (kgf/m\u00b2)', 'p\u208b (kgf/m\u00b2)', 'F\u208a (kgf)', 'F\u208b (kgf)'],
      _calcSnapshot.perHeightRows.map(r => [
        r.z, f4(r.Kz), f4(r.Kzt), f2(r.qz), sg(r.p_pos), sg(r.p_neg),
        r.F_pos !== null ? sg(r.F_pos) : '—',
        r.F_neg !== null ? sg(r.F_neg) : '—'
      ])
    );
    bld.addSpacer();
  }

  // 9.5 台電修正風壓
  if (_calcSnapshot.tpcRows && _calcSnapshot.tpcRows.length > 0) {
    bld.addH2('9.5　台電修正風壓');
    bld.addPara('z < 30 m：風壓不得小於 240 kgf/m²；z ≥ 30 m：風壓不得小於 360 kgf/m²　★ 已依規定修正');
    bld.addMultiTable(
      ['z (m)', '門檻 (kgf/m\u00b2)', '原p\u208a', '原p\u208b', '修正p\u208a', '修正p\u208b', 'F\u208a (kgf)', 'F\u208b (kgf)'],
      _calcSnapshot.tpcRows.map(r => [
        r.z, r.threshold, f2(r.p_pos_orig), f2(r.p_neg_orig),
        (r.corrected_pos ? '\u2605 ' : '') + sg(r.p_pos),
        (r.corrected_neg ? '\u2605 ' : '') + sg(r.p_neg),
        r.F_pos !== null ? sg(r.F_pos) : '—',
        r.F_neg !== null ? sg(r.F_neg) : '—'
      ])
    );
    bld.addSpacer();
  }

  // 9.6 設計包絡值
  bld.addH2('9.6　設計包絡值');
  if (fr && fr.length > 0) {
    let envRows = [];
    if (['2.1','2.2','3.1','3.2','3.3'].includes(code)) {
      const allPos = fr.map(r => Math.max(r.p_pos, r.p_neg));
      const allNeg = fr.map(r => Math.min(r.p_pos, r.p_neg));
      const maxPos = Math.max(...allPos), minNeg = Math.min(...allNeg);
      const mpFace = fr[allPos.indexOf(maxPos)];
      const mnFace = fr[allNeg.indexOf(minNeg)];
      envRows = [
        ['最大正設計值', sg(maxPos) + ' kgf/m\u00b2'],
        ['控制風面',     mpFace.face + '（' + (mpFace.p_pos >= mpFace.p_neg ? '正' : '負') + '內壓控制）'],
        ['最小負設計值', sg(minNeg) + ' kgf/m\u00b2'],
        ['控制風面',     mnFace.face + '（' + (mnFace.p_pos <= mnFace.p_neg ? '正' : '負') + '內壓控制）'],
      ];
    } else if (code === '2.3') {
      const maxP = Math.max(...fr.map(r => r.pp)), minP = Math.min(...fr.map(r => r.pp));
      envRows = [['最大正設計風壓 pp', sg(maxP) + ' kgf/m\u00b2'], ['最小負設計風壓 pp', sg(minP) + ' kgf/m\u00b2']];
    } else if (code === '2.4') {
      const maxF = Math.max(...fr.map(r => r.F)), minF = Math.min(...fr.map(r => r.F));
      envRows = [['最大設計風力 F', sg(maxF) + ' kgf'], ['最小設計風力 F', sg(minF) + ' kgf']];
    } else if (code === '3.4') {
      const maxP = Math.max(...fr.map(r => r.p)), minP = Math.min(...fr.map(r => r.p));
      envRows = [['最大正設計風壓 p', sg(maxP) + ' kgf/m\u00b2'], ['最小負設計風壓 p', sg(minP) + ' kgf/m\u00b2']];
    }
    if (envRows.length > 0) bld.addKvTable(envRows);
  }

  // ── 產生並下載 ────────────────────────────────────────────────
  try {
    const blob = bld.toBlob();
    DocxLite.downloadBlob(blob, '\u98a8\u58d3\u8a08\u7b97\u66f8_' + new Date().toISOString().slice(0, 10) + '.docx');
  } catch (err) {
    alert('匯出失敗：' + err.message);
    console.error('[exportDocx]', err);
  }
}
</script>
</body>
</html>
