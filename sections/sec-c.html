<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築物設計風力｜地況種類查詢系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e1117;
    --paper: #f5f0e8;
    --paper-warm: #ede6d6;
    --accent-red: #c0392b;
    --accent-gold: #b8870a;
    --accent-blue: #1a3a5c;
    --grid-line: rgba(14,17,23,0.10);
    --card-bg: #fffdf8;
    --A-color: #c0392b;
    --B-color: #1a3a5c;
    --C-color: #2c7a4b;
    --A-light: #fdf0ef;
    --B-light: #eef2f7;
    --C-light: #eef7f1;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 32px 40px;
    position: relative;
    z-index: 2;
  }
  .header-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-gold);
    border: 1px solid var(--accent-gold);
    padding: 3px 10px;
    margin-bottom: 20px;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(26px, 4vw, 42px);
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }
  header p {
    font-size: 14px;
    color: rgba(245,240,232,0.6);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }
  .header-deco {
    position: absolute;
    right: -20px; top: -20px;
    width: 320px; height: 320px;
    border: 60px solid rgba(245,240,232,0.04);
    border-radius: 50%;
    z-index: 1;
  }
  .header-deco2 {
    position: absolute;
    right: 80px; bottom: -80px;
    width: 200px; height: 200px;
    border: 2px solid rgba(184,135,10,0.3);
    border-radius: 50%;
    z-index: 1;
  }

  /* Layout */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Section labels */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(14,17,23,0.4);
    margin-bottom: 16px;
  }

  /* Category selector cards */
  .selector-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }
  @media (max-width: 600px) { .selector-grid { grid-template-columns: 1fr; } }

  .cat-card {
    background: var(--card-bg);
    border: 2px solid transparent;
    border-radius: 4px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .cat-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--cat-color);
    transition: width 0.25s ease;
  }
  .cat-card:hover::before,
  .cat-card.active::before { width: 8px; }
  .cat-card.active {
    border-color: var(--cat-color);
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  }
  .cat-card[data-id="A"] { --cat-color: var(--A-color); }
  .cat-card[data-id="B"] { --cat-color: var(--B-color); }
  .cat-card[data-id="C"] { --cat-color: var(--C-color); }
  .cat-card.active[data-id="A"] { background: var(--A-light); }
  .cat-card.active[data-id="B"] { background: var(--B-light); }
  .cat-card.active[data-id="C"] { background: var(--C-light); }

  .cat-letter {
    font-family: 'Noto Serif TC', serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--cat-color);
    line-height: 1;
    margin-bottom: 10px;
    opacity: 0.85;
  }
  .cat-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .cat-desc {
    font-size: 12.5px;
    line-height: 1.75;
    color: rgba(14,17,23,0.65);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .cat-badge {
    display: inline-block;
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    background: var(--cat-color);
    color: white;
    border-radius: 2px;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.2s ease;
  }
  .cat-card.active .cat-badge, .cat-card:hover .cat-badge {
    opacity: 1; transform: translateY(0);
  }

  /* Result panel */
  #result-panel {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  #result-panel.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    padding: 28px 32px;
    background: var(--card-bg);
    border-left: 6px solid var(--active-color, var(--ink));
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .result-letter-big {
    font-family: 'Noto Serif TC', serif;
    font-size: 72px;
    font-weight: 900;
    color: var(--active-color, var(--ink));
    line-height: 1;
    flex-shrink: 0;
  }
  .result-meta h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-meta p {
    font-size: 13.5px;
    line-height: 1.8;
    color: rgba(14,17,23,0.7);
  }

  /* Condition box */
  .condition-box {
    background: var(--paper-warm);
    border: 1px dashed rgba(14,17,23,0.25);
    border-radius: 4px;
    padding: 18px 24px;
    margin-bottom: 32px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .condition-icon {
    font-size: 18px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .condition-text {
    font-size: 13px;
    line-height: 1.8;
    color: rgba(14,17,23,0.75);
  }
  .condition-text strong {
    color: var(--ink);
    font-weight: 600;
  }

  /* Parameters table */
  .params-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .params-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--grid-line);
  }

  .params-table-wrap {
    overflow-x: auto;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  table.params-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
    font-size: 13.5px;
  }
  .params-table thead th {
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px 20px;
    text-align: left;
    font-weight: 400;
  }
  .params-table tbody tr {
    border-bottom: 1px solid rgba(14,17,23,0.07);
    transition: background 0.15s;
  }
  .params-table tbody tr:last-child { border-bottom: none; }
  .params-table tbody tr:hover { background: var(--paper-warm); }
  .params-table td {
    padding: 14px 20px;
    vertical-align: middle;
  }
  .param-symbol {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--active-color, var(--ink));
  }
  .param-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
  }
  .param-value-wrap {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .param-unit {
    font-size: 11px;
    color: rgba(14,17,23,0.45);
    font-family: 'JetBrains Mono', monospace;
  }
  .param-name {
    font-weight: 500;
    color: var(--ink);
  }
  .param-desc {
    font-size: 12px;
    color: rgba(14,17,23,0.5);
    margin-top: 2px;
  }

  /* Comparison table */
  .compare-section {
    margin-top: 48px;
  }
  .compare-section .params-table thead th:not(:first-child) {
    text-align: center;
  }
  .compare-table td:not(:first-child) {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
  }
  .compare-table td:first-child {
    font-weight: 500;
  }
  .highlight-A { color: var(--A-color); }
  .highlight-B { color: var(--B-color); }
  .highlight-C { color: var(--C-color); }

  /* Source note */
  .source-note {
    margin-top: 40px;
    padding: 14px 20px;
    background: var(--paper-warm);
    border-left: 3px solid var(--accent-gold);
    font-size: 12px;
    color: rgba(14,17,23,0.5);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<header>
  <div class="header-deco"></div>
  <div class="header-deco2"></div>
  <div class="header-inner">
    <div class="header-tag">建築技術規則 ／ 風力規範</div>
    <h1>地況種類查詢系統</h1>
    <p>表 2.2 地況相關參數 ｜ 第二章 建築物設計風力之計算</p>
  </div>
</header>

<main>

  <!-- Category Selector -->
  <div class="section-label">選擇地況種類</div>
  <div class="selector-grid" id="cat-grid">
    <!-- Filled by JS -->
  </div>

  <!-- Result Panel -->
  <div id="result-panel">
    <div id="result-header" class="result-header">
      <div class="result-letter-big" id="res-letter">A</div>
      <div class="result-meta">
        <h2 id="res-title">地況 A</h2>
        <p id="res-desc"></p>
      </div>
    </div>

    <div class="condition-box">
      <div class="condition-icon">📐</div>
      <div class="condition-text">
        <strong>適用條件：</strong><span id="res-condition"></span>
      </div>
    </div>

    <div class="params-title">地況參數（表 2.2）</div>
    <div class="params-table-wrap">
      <table class="params-table" id="params-table">
        <thead>
          <tr>
            <th>符號</th>
            <th>參數名稱</th>
            <th>數值</th>
            <th>單位</th>
            <th>說明</th>
          </tr>
        </thead>
        <tbody id="params-tbody"></tbody>
      </table>
    </div>

    <!-- Comparison Table -->
    <div class="compare-section">
      <div class="params-title">三種地況參數對照表</div>
      <div class="params-table-wrap">
        <table class="params-table compare-table" id="compare-table">
          <thead>
            <tr>
              <th>參數</th>
              <th>地況 A</th>
              <th>地況 B</th>
              <th>地況 C</th>
            </tr>
          </thead>
          <tbody id="compare-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="source-note">
      資料來源：建築物耐風設計規範及解說 ／ 表 2.2 地況相關參數（依建築技術規則）
    </div>
  </div>

</main>

<script src="../shared/db/terrain.js"></script>
<script>
// 地況資料庫 — 由 shared/db/terrain.js 提供
// ─── Helper: query (simulates SQL SELECT) ────────────────────────────────
function queryCategories() { return DB.categories; }
function queryCategoryById(id) { return DB.categories.find(c => c.id === id); }
function queryParamsByTerrain(terrainId) {
  return DB.parameters.filter(p => p.terrain_id === terrainId);
}

// Format symbol for display
function fmtSymbol(s) {
  const map = { 'zg': 'z<sub>g</sub>', 'zmin': 'z<sub>min</sub>' };
  return map[s] || s;
}

// Format value
function fmtValue(v) {
  if (Number.isInteger(v)) return v.toString();
  return v % 1 === 0 ? v.toFixed(0) : (v < 1 ? v.toString() : v.toFixed(2));
}

const accentColors = { A: 'var(--A-color)', B: 'var(--B-color)', C: 'var(--C-color)' };
const catShortDesc = {
  A: '市中心 / 高樓密集區',
  B: '郊區 / 小市鎮 / 障礙物密布區',
  C: '平坦開闊 / 草原 / 海岸'
};

// ─── Render category cards ────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cat-grid');
  queryCategories().forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.id = cat.id;
    card.innerHTML = `
      <div class="cat-letter">${cat.id}</div>
      <div class="cat-title">${cat.name}</div>
      <div class="cat-desc">${cat.description}</div>
      <div class="cat-badge">${catShortDesc[cat.id]}</div>
    `;
    card.addEventListener('click', () => selectCategory(cat.id));
    grid.appendChild(card);
  });
}

// ─── Select and render result ─────────────────────────────────────────────
let currentId = null;

function selectCategory(id) {
  if (currentId === id) return;
  currentId = id;

  // Update cards
  document.querySelectorAll('.cat-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });

  const cat = queryCategoryById(id);
  const params = queryParamsByTerrain(id);
  const color = accentColors[id];

  // Update result header
  document.getElementById('result-header').style.setProperty('--active-color', color);
  document.getElementById('result-header').style.borderLeftColor = color;
  document.getElementById('res-letter').textContent = id;
  document.getElementById('res-letter').style.color = color;
  document.getElementById('res-title').textContent = cat.name;
  document.getElementById('res-desc').textContent = cat.description;
  document.getElementById('res-condition').textContent = cat.application_condition;

  // Update params table
  const tbody = document.getElementById('params-tbody');
  tbody.innerHTML = '';
  params.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="param-symbol" style="color:${color}">${fmtSymbol(p.parameter_symbol)}</span></td>
      <td>
        <div class="param-name">${p.parameter_name}</div>
      </td>
      <td>
        <div class="param-value-wrap">
          <span class="param-value">${fmtValue(p.parameter_value)}</span>
        </div>
      </td>
      <td><span class="param-unit">${p.unit}</span></td>
      <td><span class="param-desc">${p.description}</span></td>
    `;
    tbody.appendChild(tr);
  });

  // Update comparison table
  renderCompare(id);

  // Show panel
  const panel = document.getElementById('result-panel');
  panel.classList.remove('visible');
  void panel.offsetWidth; // reflow for animation reset
  panel.classList.add('visible');
  // Scroll to result
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);

  // 回傳結果至整合式父頁面
  const paramSummary = params.map(p => ({
    symbol: p.parameter_symbol,
    name: p.parameter_name,
    value: p.parameter_value,
    unit: p.unit
  }));
  if (window.parent !== window) {
    window.parent.postMessage({
      source: 'terrain_query',
      terrainId: id,
      terrainName: cat.name,
      description: cat.description,
      applicationCondition: cat.application_condition,
      parameters: paramSummary,
      timestamp: new Date().toISOString()
    }, '*');
  }
}

function renderCompare(activeId) {
  const tbody = document.getElementById('compare-tbody');
  tbody.innerHTML = '';

  // Get unique parameter symbols in order
  const symbolOrder = ['α','zg','b̄','c','λ','ε̄','zmin'];
  const nameMap = {};
  DB.parameters.forEach(p => { nameMap[p.parameter_symbol] = p.parameter_name; });

  symbolOrder.forEach(sym => {
    const tr = document.createElement('tr');
    const valA = DB.parameters.find(p => p.terrain_id==='A' && p.parameter_symbol===sym);
    const valB = DB.parameters.find(p => p.terrain_id==='B' && p.parameter_symbol===sym);
    const valC = DB.parameters.find(p => p.terrain_id==='C' && p.parameter_symbol===sym);
    if (!valA) return;

    const unit = valA.unit === '無因次' ? '—' : valA.unit;

    tr.innerHTML = `
      <td>
        <span style="font-family:'JetBrains Mono',monospace;font-size:13px;margin-right:8px">${fmtSymbol(sym)}</span>
        <span style="font-size:12px;color:rgba(14,17,23,0.5)">${nameMap[sym] || ''} <span style="font-size:11px">(${unit})</span></span>
      </td>
      <td class="${activeId==='A'?'highlight-A':''}" style="font-weight:${activeId==='A'?'700':'400'}">${fmtValue(valA.parameter_value)}</td>
      <td class="${activeId==='B'?'highlight-B':''}" style="font-weight:${activeId==='B'?'700':'400'}">${fmtValue(valB.parameter_value)}</td>
      <td class="${activeId==='C'?'highlight-C':''}" style="font-weight:${activeId==='C'?'700':'400'}">${fmtValue(valC.parameter_value)}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────
renderCards();
</script>
</body>
</html>
