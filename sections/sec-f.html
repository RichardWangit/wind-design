<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築物設計風壓計算式查詢系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js" crossorigin="anonymous"></script>
<style>
  :root {
    --ink: #1c1410;
    --ink-mid: #2d3561;
    --ink-light: #4a5480;
    --accent: #c8a96e;
    --accent-dark: #a8843e;
    --accent-glow: rgba(200, 169, 110, 0.15);
    --surface: #f4f1eb;
    --surface-dark: #e8e3d8;
    --surface-card: #faf8f4;
    --border: rgba(45, 53, 97, 0.15);
    --red: #c0392b;
    --green: #27ae60;
    --shadow: 0 2px 16px rgba(26, 26, 46, 0.10);
    --shadow-lg: 0 8px 40px rgba(26, 26, 46, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.7;
  }

  /* Header */
  .header {
    background: var(--ink);
    color: white;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 80px,
      rgba(200,169,110,0.04) 80px,
      rgba(200,169,110,0.04) 81px
    );
    pointer-events: none;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 32px 28px;
    position: relative;
  }
  .header-badge {
    display: inline-block;
    background: var(--accent-glow);
    border: 1px solid rgba(200,169,110,0.4);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 14px;
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.03em;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .header p {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-weight: 300;
  }
  .header-deco {
    position: absolute;
    right: 32px; top: 50%;
    transform: translateY(-50%);
    font-size: 80px;
    opacity: 0.07;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    pointer-events: none;
    letter-spacing: -5px;
  }

  /* Main layout */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 32px 64px;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 28px;
    align-items: start;
  }

  /* Sidebar steps */
  .sidebar { position: sticky; top: 24px; }

  .step-card {
    background: var(--surface-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    transition: all 0.25s ease;
  }
  .step-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow); }
  .step-card.completed { opacity: 0.7; }
  .step-card.locked { opacity: 0.4; pointer-events: none; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .step-header:hover { background: var(--surface-dark); }

  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--ink-mid);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .step-card.active .step-num { background: var(--accent); color: var(--ink); }
  .step-card.completed .step-num { background: var(--green); }

  .step-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    flex: 1;
  }
  .step-value {
    font-size: 11px;
    color: var(--accent-dark);
    font-weight: 500;
    text-align: right;
    max-width: 100px;
    line-height: 1.3;
  }

  .step-options {
    padding: 0 16px 14px;
    display: none;
    gap: 8px;
    flex-direction: column;
  }
  .step-card.active .step-options { display: flex; }

  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .option-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
  .option-btn.selected { border-color: var(--accent); background: var(--accent-glow); color: var(--ink); }
  .option-btn.selected .option-icon { color: var(--accent); }

  .option-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    color: var(--ink-light);
  }
  .option-text strong { display: block; font-weight: 600; margin-bottom: 2px; }
  .option-text span { font-size: 11px; color: var(--ink-light); line-height: 1.4; display: block; }

  /* Result panel */
  .result-panel { min-height: 400px; }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .breadcrumb span { color: var(--accent-dark); font-weight: 500; }
  .breadcrumb .sep { opacity: 0.4; }

  .empty-state {
    background: var(--surface-card);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 60px 40px;
    text-align: center;
    color: var(--ink-light);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; font-family: 'Noto Serif TC', serif; }
  .empty-state p { font-size: 13px; }

  /* Formula card */
  .formula-result {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .formula-list { display: flex; flex-direction: column; gap: 20px; }

  .formula-card {
    background: var(--surface-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .formula-card:hover { box-shadow: var(--shadow-lg); }
  .formula-card.selected {
    border: 2px solid var(--accent7, #4a7c2a);
    background: rgba(45, 80, 22, 0.04);
  }

  .formula-card-header {
    background: var(--ink);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .formula-badge {
    background: var(--accent);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .formula-card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
  }

  .formula-body { padding: 20px; }

  .formula-display-box {
    background: var(--ink);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .formula-display-box::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(200,169,110,0.03) 10px, rgba(200,169,110,0.03) 11px);
    pointer-events: none;
  }
  .formula-display-box .MathJax { color: white !important; font-size: 1.3em !important; }
  .formula-plain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .condition-box {
    background: rgba(200, 169, 110, 0.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ink-mid);
  }
  .condition-box strong { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-dark); margin-bottom: 6px; }
  .condition-box pre { white-space: pre-wrap; font-family: inherit; line-height: 1.7; }

  .params-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .params-title::before {
    content: '';
    width: 4px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  .params-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .params-table th {
    background: var(--surface-dark);
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-light);
    border-bottom: 1.5px solid var(--border);
  }
  .params-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.5;
  }
  .params-table tr:last-child td { border-bottom: none; }
  .params-table tr:hover td { background: var(--accent-glow); }

  .sym-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-mid);
    white-space: nowrap;
  }
  .unit-cell {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .ref-cell {
    font-size: 11px;
    color: var(--accent-dark);
    white-space: nowrap;
  }

  .notes-box {
    margin-top: 16px;
    background: var(--surface);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--ink-light);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  /* DB schema badge */
  .schema-info {
    background: var(--surface-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 14px;
  }
  .schema-info h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-dark); margin-bottom: 8px; font-weight: 700; }
  .schema-tag {
    display: inline-block;
    background: var(--ink);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    margin: 2px;
  }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; padding: 16px; }
    .sidebar { position: static; }
    .header-deco { display: none; }
    .header-inner { padding: 24px 20px; }
    .header h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-badge">建築物耐風設計規範</div>
    <h1>設計風壓計算式查詢系統</h1>
    <p>依 ASCE 7 規範精神，整合第二章主要風力抵抗系統與第三章局部構材外部被覆物設計風壓公式</p>
    <div class="header-deco">p=qGC<sub>p</sub></div>
  </div>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">

    <div class="schema-info">
      <h4>資料庫正規化架構</h4>
      <span class="schema-tag">building_type</span>
      <span class="schema-tag">enclosure_type</span>
      <span class="schema-tag">design_system</span>
      <span class="schema-tag">subcategory</span>
      <span class="schema-tag">formula</span>
      <span class="schema-tag">parameter</span>
      <span class="schema-tag">formula_parameter</span>
    </div>

    <!-- Step 1 -->
    <div class="step-card active" id="step1-card">
      <div class="step-header" onclick="toggleStep(1)">
        <div class="step-num">1</div>
        <div class="step-title">建築物類型</div>
        <div class="step-value" id="step1-val">—</div>
      </div>
      <div class="step-options" id="step1-opts">
        <!-- injected -->
      </div>
    </div>

    <!-- Step 2 -->
    <div class="step-card locked" id="step2-card">
      <div class="step-header" onclick="toggleStep(2)">
        <div class="step-num">2</div>
        <div class="step-title">封閉類型</div>
        <div class="step-value" id="step2-val">—</div>
      </div>
      <div class="step-options" id="step2-opts"></div>
    </div>

    <!-- Step 3 -->
    <div class="step-card locked" id="step3-card">
      <div class="step-header" onclick="toggleStep(3)">
        <div class="step-num">3</div>
        <div class="step-title">設計系統</div>
        <div class="step-value" id="step3-val">—</div>
      </div>
      <div class="step-options" id="step3-opts"></div>
    </div>

    <!-- Step 4 -->
    <div class="step-card locked" id="step4-card">
      <div class="step-header" onclick="toggleStep(4)">
        <div class="step-num">4</div>
        <div class="step-title">子分類</div>
        <div class="step-value" id="step4-val">—</div>
      </div>
      <div class="step-options" id="step4-opts"></div>
    </div>

  </div>

  <!-- Result -->
  <div class="result-panel">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div id="result-area">
      <div class="empty-state">
        <div class="icon">🏗️</div>
        <h3>請從左側依序選擇條件</h3>
        <p>系統將依據您的選擇，從資料庫中查詢對應的設計風壓計算式及參數說明</p>
      </div>
    </div>
  </div>
</div>

// Build lookup maps
const paramMap = {};
DB.parameters.forEach(p => { paramMap[p.id] = p; });
const subcatMap = {};
DB.subcategories.forEach(s => { subcatMap[s.id] = s; });

// State
const sel = { building: null, enclosure: null, system: null, subcat: null, formulaCode: null };

// Icons
const btIcons = { ordinary: '🏢', flexible: '🏙️' };
const etIcons = { closed: '🔒', partial_open: '🪟', open: '🌬️' };
const dsIcons = { mwfrs: '🏗️', c_and_c: '🔩' };

// Step 1: Building type
function initStep1() {
  const el = document.getElementById('step1-opts');
  el.innerHTML = DB.building_types.map(bt => `
    <button class="option-btn" onclick="selectBuilding(${bt.id})" data-id="${bt.id}">
      <span class="option-icon">${btIcons[bt.code]||'🏢'}</span>
      <span class="option-text">
        <strong>${bt.name}</strong>
        <span>${bt.description}</span>
      </span>
    </button>`).join('');
}

function selectBuilding(id) {
  sel.building = id; sel.enclosure = null; sel.system = null; sel.subcat = null;
  const bt = DB.building_types.find(x => x.id === id);
  setStepValue(1, bt.name);
  markSelected('step1-opts', id);
  setStepState(1,'completed'); setStepState(2,'active');
  initStep2();
  updateBreadcrumb();
  showEmpty();
}

// Step 2: Enclosure type
function initStep2() {
  const el = document.getElementById('step2-opts');
  el.innerHTML = DB.enclosure_types.map(et => `
    <button class="option-btn" onclick="selectEnclosure(${et.id})" data-id="${et.id}">
      <span class="option-icon">${etIcons[et.code]||'🏠'}</span>
      <span class="option-text">
        <strong>${et.name}</strong>
        <span>${et.description}</span>
      </span>
    </button>`).join('');
}

function selectEnclosure(id) {
  sel.enclosure = id; sel.system = null; sel.subcat = null;
  const et = DB.enclosure_types.find(x => x.id === id);
  setStepValue(2, et.name);
  markSelected('step2-opts', id);
  setStepState(2,'completed'); setStepState(3,'active');
  initStep3();
  updateBreadcrumb();
  showEmpty();
}

// Step 3: Design system
function initStep3() {
  const el = document.getElementById('step3-opts');
  el.innerHTML = DB.design_systems.map(ds => `
    <button class="option-btn" onclick="selectSystem(${ds.id})" data-id="${ds.id}">
      <span class="option-icon">${dsIcons[ds.code]||'⚙️'}</span>
      <span class="option-text">
        <strong>${ds.name}</strong>
        <span>${ds.description}</span>
      </span>
    </button>`).join('');
}

function selectSystem(id) {
  sel.system = id; sel.subcat = null;
  const ds = DB.design_systems.find(x => x.id === id);
  setStepValue(3, ds.name.replace(' (MWFRS)','').replace(' (C&C)',''));
  markSelected('step3-opts', id);
  setStepState(3,'completed'); setStepState(4,'active');
  initStep4();
  updateBreadcrumb();
  showEmpty();
}

// Step 4: Subcategory (filtered)
function initStep4() {
  const bt = DB.building_types.find(x => x.id === sel.building);
  const et = DB.enclosure_types.find(x => x.id === sel.enclosure);

  const filtered = DB.subcategories.filter(s => {
    if (s.design_system_id !== sel.system) return false;
    const abt = JSON.parse(s.applicable_building_types);
    const aet = JSON.parse(s.applicable_enclosure_types);
    return abt.includes(bt.code) && aet.includes(et.code);
  });

  const el = document.getElementById('step4-opts');
  if (filtered.length === 0) {
    el.innerHTML = '<div style="font-size:13px;color:#888;padding:8px 0">此組合無適用子分類</div>';
    return;
  }
  el.innerHTML = filtered.map(s => `
    <button class="option-btn" onclick="selectSubcat(${s.id})" data-id="${s.id}">
      <span class="option-icon">📐</span>
      <span class="option-text">
        <strong>${s.name}</strong>
        <span>${s.description}</span>
      </span>
    </button>`).join('');
}

function selectSubcat(id) {
  sel.subcat = id;
  const s = DB.subcategories.find(x => x.id === id);
  setStepValue(4, s.name);
  markSelected('step4-opts', id);
  setStepState(4,'active');
  updateBreadcrumb();
  showFormulas();
}

// Query formulas from DB
function queryFormulas() {
  // building_type_id & enclosure_type_id may be null (formula applies to all types)
  return DB.formulas.filter(f => {
    if (f.building_type_id !== null && f.building_type_id !== sel.building) return false;
    if (f.design_system_id !== sel.system) return false;
    if (f.subcategory_id !== sel.subcat) return false;
    return true;
  });
}

function sendFormulaToHub() {
  if (window.parent === window) return;
  const formulas = queryFormulas();
  const bt = DB.building_types.find(x => x.id === sel.building);
  const et = DB.enclosure_types.find(x => x.id === sel.enclosure);
  const ds = DB.design_systems.find(x => x.id === sel.system);
  const sc = DB.subcategories.find(x => x.id === sel.subcat);
  window.parent.postMessage({
    source: 'wind_pressure_formula',
    buildingType:  bt ? bt.name : '',
    enclosureType: et ? et.name : '',
    designSystem:  ds ? ds.name : '',
    subcategory:   sc ? sc.name : '',
    selectedFormulaCode: sel.formulaCode,
    formulas: formulas.map(f => ({
      code:    f.formula_code,
      name:    f.formula_name,
      display: f.formula_display,
      condition: f.applicable_condition || '',
      isExtra: false
    })),
    timestamp: new Date().toISOString()
  }, '*');
}

function selectFormula(code) {
  sel.formulaCode = code;
  document.querySelectorAll('.formula-card').forEach(card => {
    card.classList.toggle('selected', card.dataset.code === code);
  });
  sendFormulaToHub();
}

function showFormulas() {
  const formulas = queryFormulas();
  const area = document.getElementById('result-area');
  if (formulas.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>查無符合的計算式</h3><p>此條件組合目前資料庫中無對應公式，請嘗試其他組合</p></div>`;
    return;
  }
  // Reset selection when criteria change
  sel.formulaCode = null;
  area.innerHTML = `<div class="formula-result"><div class="formula-list">${formulas.map(f => renderFormula(f)).join('')}</div></div>`;
  // Typeset MathJax
  if (window.MathJax) {
    MathJax.typesetPromise([area]).catch(err => {
      console.log('MathJax error', err);
      // Fallback: show plain text
      document.querySelectorAll('.math-fallback').forEach(el => el.style.display = 'block');
      document.querySelectorAll('.mjx-container').forEach(el => el.style.display = 'none');
    });
  }
  // Auto-select when only one formula matches
  if (formulas.length === 1) {
    selectFormula(formulas[0].formula_code);
  } else {
    sendFormulaToHub();
  }
}

function renderFormula(f) {
  const params = f.parameter_ids.map(id => paramMap[id]).filter(Boolean);
  const condLines = f.applicable_condition ? f.applicable_condition.split('\n') : [];

  const paramsRows = params.map(p => `
    <tr>
      <td class="sym-cell">${p.symbol_display}</td>
      <td>${p.name}</td>
      <td class="unit-cell">${p.unit || '—'}</td>
      <td>${p.description}</td>
      <td class="ref-cell">${p.reference || '—'}</td>
    </tr>`).join('');

  return `
  <div class="formula-card" data-code="${f.formula_code}" onclick="selectFormula('${f.formula_code}')">
    <div class="formula-card-header">
      <span class="formula-badge">公式 ${f.formula_code}</span>
      <span class="formula-card-title">${f.formula_name}</span>
    </div>
    <div class="formula-body">
      <div class="formula-display-box">
        <div>\\(${f.formula_latex}\\)</div>
        <div class="formula-plain" style="margin-top:10px;font-size:13px;opacity:0.5">${f.formula_display}</div>
      </div>
      ${condLines.length ? `
      <div class="condition-box">
        <strong>適用條件</strong>
        <pre>${f.applicable_condition}</pre>
      </div>` : ''}
      <div class="params-title">參數說明</div>
      <table class="params-table">
        <thead>
          <tr>
            <th>符號</th><th>名稱</th><th>單位</th><th>說明</th><th>參考節次</th>
          </tr>
        </thead>
        <tbody>${paramsRows}</tbody>
      </table>
      <div class="notes-box">
        <span>📌</span>
        <span>${f.notes} · 資料來源：建築物耐風設計規範，參照 ASCE 7 規範</span>
      </div>
    </div>
  </div>`;
}

// UI helpers
function setStepValue(n, v) {
  document.getElementById(`step${n}-val`).textContent = v;
}
function markSelected(containerId, id) {
  document.querySelectorAll(`#${containerId} .option-btn`).forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.id) === id);
  });
}
function setStepState(n, state) {
  const card = document.getElementById(`step${n}-card`);
  card.classList.remove('active','completed','locked');
  card.classList.add(state);
}
function toggleStep(n) {
  const card = document.getElementById(`step${n}-card`);
  if (card.classList.contains('locked')) return;
  // Allow going back
  if (card.classList.contains('completed')) {
    setStepState(n, 'active');
    // Lock subsequent steps
    for (let i = n+1; i <= 4; i++) { setStepState(i,'locked'); setStepValue(i,'—'); }
    if (n<=1) { sel.building=null; }
    if (n<=2) { sel.enclosure=null; }
    if (n<=3) { sel.system=null; }
    sel.subcat=null;
    updateBreadcrumb();
    showEmpty();
  }
}
function showEmpty() {
  document.getElementById('result-area').innerHTML = `
    <div class="empty-state">
      <div class="icon">📋</div>
      <h3>請繼續選擇條件</h3>
      <p>完成所有四個步驟後，系統將顯示對應的設計風壓計算式</p>
    </div>`;
}
function updateBreadcrumb() {
  const parts = [];
  if (sel.building) parts.push(DB.building_types.find(x=>x.id===sel.building)?.name);
  if (sel.enclosure) parts.push(DB.enclosure_types.find(x=>x.id===sel.enclosure)?.name);
  if (sel.system) parts.push(DB.design_systems.find(x=>x.id===sel.system)?.name);
  if (sel.subcat) parts.push(DB.subcategories.find(x=>x.id===sel.subcat)?.name);
  const bc = document.getElementById('breadcrumb');
  if (parts.length === 0) { bc.innerHTML=''; return; }
  bc.innerHTML = parts.map((p,i) => `${i>0?'<span class="sep">›</span>':''}<span>${p}</span>`).join('');
}

// Init
initStep1();
</script>
</body>
</html>
