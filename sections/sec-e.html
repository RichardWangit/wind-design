<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築物風壓係數查詢計算系統（表2.4～表2.17）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c1410;--paper:#f2ead6;--card-bg:#faf5e9;
  --accent6:#7a4419;--border:#d4c9b0;--muted:#7a7060;--gold:#b8860b;
  --green:#2e7a4b;--red:#dc2626;--orange:#d97706;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  background: var(--paper);
  background-image:
    radial-gradient(ellipse at 15% 10%, rgba(122,68,25,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 88% 92%, rgba(184,134,11,0.06) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,160,120,0.07) 39px, rgba(180,160,120,0.07) 40px);
  color:var(--ink);min-height:100vh
}
header{background:var(--ink);color:var(--paper);padding:20px 24px;box-shadow:0 4px 16px rgba(28,20,16,0.2);border-bottom:3px solid var(--accent6);position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px);pointer-events:none}
header h1{font-size:1.35rem;font-weight:700;letter-spacing:.5px;font-family:'Noto Serif TC',serif;position:relative}
header p{font-size:.82rem;opacity:.6;margin-top:4px;position:relative;color:var(--paper)}
.container{max-width:1100px;margin:0 auto;padding:20px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:0 1px 3px rgba(28,20,16,0.05),0 4px 12px rgba(28,20,16,0.08),0 8px 28px rgba(28,20,16,0.10);padding:20px;margin-bottom:18px;border:1.5px solid var(--border);border-left:4px solid var(--accent6)}
#resultCard{position:relative;overflow:hidden;box-shadow:0 0 0 3px rgba(122,68,25,0.10),0 4px 20px rgba(28,20,16,0.12)}
#resultCard::before{content:'Cp';position:absolute;right:-10px;bottom:-30px;font-family:'Noto Serif TC',serif;font-size:160px;font-weight:900;color:var(--ink);opacity:0.03;pointer-events:none;line-height:1;z-index:0}
#resultCard>*{position:relative;z-index:1}
.card-title{font-size:1rem;font-weight:700;color:var(--accent6);margin-bottom:14px;display:flex;align-items:center;gap:8px;font-family:'Noto Serif TC',serif}
.card-title svg{width:18px;height:18px}
label{font-size:.85rem;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;margin-top:12px}
label:first-child{margin-top:0}
select,input[type=number]{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;transition:.2s;background:#fff;color:var(--ink)}
select:focus,input:focus{border-color:var(--accent6);box-shadow:0 0 0 3px rgba(122,68,25,0.12);background:#fff}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:var(--ink);color:var(--paper);border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:.2s;border-bottom:3px solid var(--accent6)}
.btn:hover{background:#2a201a;transform:translateY(-1px)}
.btn-reset{background:var(--muted);border-bottom-color:#5a5040}
.btn-reset:hover{background:#5a5040}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
/* Results */
.result-section{display:none}
.result-section.show{display:block}
.result-table{width:100%;border-collapse:collapse;font-size:.88rem;margin:10px 0}
.result-table th{background:var(--ink);color:var(--paper);padding:9px 12px;text-align:left;border:1px solid var(--border);font-weight:700;font-family:'Noto Serif TC',serif}
.result-table td{padding:8px 12px;border:1px solid var(--border);vertical-align:top;color:var(--ink)}
.result-table tr:nth-child(even)td{background:rgba(242,234,214,0.5)}
.highlight{background:rgba(122,68,25,0.08) !important;font-weight:700;border-left:3px solid var(--accent6)}
.result-table tbody tr{transition:background 0.15s}
.result-table tbody tr:hover td{background:rgba(122,68,25,0.06) !important}
.cp-pos{color:var(--green);font-weight:700}
.cp-neg{color:var(--red);font-weight:700}
/* Formula box */
.formula-box{background:rgba(122,68,25,0.05);border:1px solid rgba(122,68,25,0.2);border-radius:8px;padding:14px 16px;margin:12px 0;font-size:.88rem}
.formula-box h4{color:var(--accent6);font-size:.9rem;margin-bottom:8px;font-weight:700;font-family:'Noto Serif TC',serif}
.formula{font-family:'DM Mono','Courier New',monospace;font-size:.95rem;background:rgba(122,68,25,0.08);padding:8px 12px;border-radius:6px;margin:6px 0;display:block;color:var(--ink)}
.note-box{background:#faf0d7;border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:10px 0;font-size:.82rem;color:#5c3d10}
.note-box b{color:var(--accent6)}
/* SVG diagrams */
.diagram-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;margin:12px 0;overflow-x:auto}
.diagram-wrap svg{display:block;margin:0 auto}
/* Tag pills */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.75rem;font-weight:700;margin:2px}
.pill-blue{background:rgba(46,79,122,0.12);color:#2e4f7a}
.pill-red{background:rgba(192,57,43,0.12);color:#c0392b}
.pill-green{background:rgba(58,107,69,0.12);color:#3a6b45}
/* Steps */
.steps{display:flex;gap:0;margin-bottom:18px}
.step{flex:1;text-align:center;padding:10px 4px;font-size:.78rem;font-weight:700;color:var(--muted);border-bottom:3px solid var(--border);position:relative}
.step.active{color:var(--accent6);border-color:var(--accent6);text-shadow:0 0 8px rgba(122,68,25,0.15)}
.step.active .step-num{display:inline-block;background:rgba(122,68,25,0.08);border-radius:4px;padding:0 4px}
.step.done{color:#3a6b45;border-color:#3a6b45}
.step-num{display:block;font-size:1.1rem;font-weight:900;margin-bottom:3px;font-family:'Noto Serif TC',serif}
/* Summary cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:12px 0}
.summary-card{border-radius:10px;padding:14px;text-align:center;border:2px solid}
.summary-card.windward{background:rgba(58,107,69,0.08);border-color:#3a6b45}
.summary-card.leeward{background:rgba(192,57,43,0.08);border-color:#c0392b}
.summary-card.side{background:rgba(184,134,11,0.08);border-color:#b8860b}
.summary-card.internal{background:rgba(46,79,122,0.08);border-color:#2e4f7a}
.summary-card .sc-label{font-size:.75rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.summary-card .sc-value{font-size:1.5rem;font-weight:900;margin:4px 0;font-family:'Noto Serif TC',serif}
.summary-card .sc-formula{font-size:.72rem;color:var(--muted);margin-top:4px}
/* interpolation indicator */
.interp-tag{background:rgba(184,134,11,0.12);color:#7a5800;font-size:.72rem;padding:2px 7px;border-radius:4px;font-weight:700}
.btn-calc-a{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent6);color:var(--paper);border:none;border-radius:7px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:10px}
.btn-calc-a:hover{background:#5c3010}
.a-result-box{background:rgba(58,107,69,0.08);border:1.5px solid #3a6b45;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:.88rem;display:none}
.a-result-box.show{display:block}
.zone-sel-wrap{background:rgba(122,68,25,0.05);border:1.5px solid var(--accent6);border-radius:8px;padding:12px 14px;margin-top:12px;display:none}
.zone-sel-wrap.show{display:block}
.zone-sel-wrap label{color:var(--accent6);font-weight:700}
select[id^="cc_zone"]{margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>🌬️ 建築物外風壓係數與內風壓係數查詢計算系統</h1>
  <p>依據建築物耐風設計規範 表2.4 ～ 表2.17（主要風力抵抗系統）| 圖3.1 ～ 圖3.3（局部構件及外部被覆物）</p>
</header>

<div class="container">

<!-- Step indicator -->
<div class="steps" id="stepBar">
  <div class="step active" id="s1"><span class="step-num">①</span>建築類型</div>
  <div class="step" id="s2"><span class="step-num">②</span>構件種類</div>
  <div class="step" id="s3"><span class="step-num">③</span>輸入參數</div>
  <div class="step" id="s4"><span class="step-num">④</span>計算結果</div>
</div>

<!-- Step 1: Building type -->
<div class="card" id="card1">
  <div class="card-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    第一步：選擇建築物形式
  </div>
  <label>查詢系統類型</label>
  <select id="systemType" disabled
    style="background:#f0ece0;color:#888070;cursor:not-allowed;" title="由 0 區自動帶入並鎖定">
    <option value="">-- 請先在 0 區設定 --</option>
    <option value="mwfrs">主要風力抵抗系統</option>
    <option value="cc">局部構件及外部被覆物</option>
  </select>
  <div id="buildingTypeWrap" style="display:none">
    <label>建築物形式（依開口率分類）</label>
    <select id="buildingType" disabled
      style="background:#f0ece0;color:#888070;cursor:not-allowed;" title="由 0 區自動帶入並鎖定">
      <option value="">-- 請先在 0 區設定 --</option>
      <option value="enclosed">封閉式建築物（開口率 &lt; 20%）</option>
      <option value="partial">部分封閉式建築物（開口率 20%~80%）</option>
      <option value="open">開放式建築物（開口率 ≧ 80%）</option>
    </select>
  </div>
  <div class="note-box" id="buildingNote" style="display:none"></div>
  <div class="diagram-wrap" id="buildingDiag" style="display:none"></div>
  <div id="zone0-lock-badge" style="margin-top:12px;padding:8px 14px;background:rgba(107,76,17,0.08);border:1px solid rgba(107,76,17,0.25);border-left:3px solid #6b4c11;border-radius:5px;font-size:11.5px;color:#6b4c11;font-family:'DM Mono',monospace;letter-spacing:.04em;line-height:1.6;">
    🔒 查詢系統類型及建築物形式由 <strong>0 區</strong> 自動帶入並鎖定。
  </div>
</div>

<!-- Step 2: Component type -->
<div class="card" id="card2" style="display:none">
  <div class="card-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="3" x2="8" y2="21"/></svg>
    第二步：選擇構件種類
  </div>
  <label>構件類型</label>
  <select id="componentType" onchange="onComponentChange()">
    <option value="">-- 請選擇 --</option>
  </select>
  <div id="componentDesc" style="margin-top:10px;font-size:.83rem;color:var(--muted)"></div>
</div>

<!-- Step 3: Parameters -->
<div class="card" id="card3" style="display:none">
  <div class="card-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="4"/><polyline points="6 9 12 3 18 9"/></svg>
    第三步：輸入計算參數
  </div>
  <div id="paramArea"></div>
  <div id="paramDiagram" style="margin-top:10px"></div>
  <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn" onclick="calculate()">⚡ 計算風壓係數</button>
    <button class="btn btn-reset" onclick="resetAll()">↺ 重新開始</button>
  </div>
</div>

<!-- Step 4: Results -->
<div class="card result-section" id="resultCard">
  <div class="card-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    第四步：計算結果
  </div>
  <div id="resultContent"></div>
</div>

</div><!-- container -->

<script>

function logInterp(curve, A){
  const logA=Math.log10(Math.max(A,0.5));
  if(logA<=curve[0][0]) return curve[0][1];
  if(logA>=curve[curve.length-1][0]) return curve[curve.length-1][1];
  for(let i=0;i<curve.length-1;i++){
    if(logA>=curve[i][0]&&logA<=curve[i+1][0]){
      const t=(logA-curve[i][0])/(curve[i+1][0]-curve[i][0]);
      return curve[i][1]+t*(curve[i+1][1]-curve[i][1]);
    }
  }
  return curve[curve.length-1][1];
}

function computeA_value(){
  const h=parseFloat(document.getElementById('cc_h').value)||0;
  const minW=parseFloat(document.getElementById('cc_minW').value)||0;
  if(h<=0||minW<=0) return null;
  let a=Math.min(0.4*h, 0.1*minW);
  const aMin=Math.max(0.9, 0.04*minW);
  if(a<aMin) a=aMin;
  return a;
}

// ===== SVG CHART HELPER =====
// Maps GCp value (-7 to +3) to SVG Y, and log10(A) in [log(0.5)..log(100)] to SVG X
function makeCCChart(curves, title, yMin, yMax, yTicks, showDot, dotA, dotVal, dotColor){
  // Chart area: left=60, right=500, top=30, bottom=220, width=560, height=280
  const CL=60, CR=500, CT=30, CB=220, CW=560, CH=280;
  const xVals=[0.5,1,2,5,10,20,50,100];
  const xLabels=['0.5','1','2','5','10','20','50','100'];
  const logMin=Math.log10(0.5), logMax=Math.log10(100);
  function xp(A){ return CL+(Math.log10(A)-logMin)/(logMax-logMin)*(CR-CL); }
  function yp(v){ return CT+(yMax-v)/(yMax-yMin)*(CB-CT); }
  // Grid lines & x-axis
  let grid='', xAxis='', yAxis='';
  xVals.forEach((A,i)=>{
    const x=xp(A);
    grid+=`<line x1="${x}" y1="${CT}" x2="${x}" y2="${CB}" stroke="#e2e8f0" stroke-width="1"/>`;
    xAxis+=`<text x="${x}" y="${CB+14}" text-anchor="middle" font-size="10" fill="#475569">${xLabels[i]}</text>`;
  });
  yTicks.forEach(v=>{
    const y=yp(v);
    grid+=`<line x1="${CL}" y1="${y}" x2="${CR}" y2="${y}" stroke="${v===0?'#94a3b8':'#e2e8f0'}" stroke-width="${v===0?1.5:1}"/>`;
    yAxis+=`<text x="${CL-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#475569">${v}</text>`;
  });
  // Curves
  let paths='', labels='';
  curves.forEach(c=>{
    const pts=c.data.map(([A,v])=>`${xp(A).toFixed(1)},${yp(v).toFixed(1)}`).join(' ');
    paths+=`<polyline points="${pts}" fill="none" stroke="${c.color}" stroke-width="2.2" stroke-dasharray="${c.dash||''}"/>`;
    // Label at right end
    const last=c.data[c.data.length-1];
    const ly=yp(last[1]);
    labels+=`<text x="${CR+4}" y="${ly+4}" font-size="10" fill="${c.color}" font-weight="700">${c.label}</text>`;
  });
  // Dot marker for computed value
  let dot='';
  if(showDot&&dotA&&dotVal!==undefined){
    const dx=xp(dotA), dy=yp(dotVal);
    dot=`<circle cx="${dx}" cy="${dy}" r="6" fill="${dotColor||'#f59e0b'}" stroke="#fff" stroke-width="2"/>
    <line x1="${dx}" y1="${CT}" x2="${dx}" y2="${CB}" stroke="${dotColor||'#f59e0b'}" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="${CL}" y1="${dy}" x2="${CR}" y2="${dy}" stroke="${dotColor||'#f59e0b'}" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${dx}" y="${dy-10}" text-anchor="middle" font-size="10" fill="${dotColor||'#f59e0b'}" font-weight="700">A=${dotA}m²</text>`;
  }
  return `<div class="diagram-wrap" style="margin-top:14px">
  <div style="font-size:.82rem;font-weight:700;color:#1a56db;margin-bottom:6px">📈 ${title}</div>
  <div style="overflow-x:auto">
  <svg width="${CW+80}" height="${CH+50}" viewBox="0 0 ${CW+80} ${CH+50}" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:400px">
    <!-- border -->
    <rect x="${CL}" y="${CT}" width="${CR-CL}" height="${CB-CT}" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2"/>
    ${grid}${paths}${dot}
    <!-- axes labels -->
    ${xAxis}
    ${yAxis}
    <text x="${(CL+CR)/2}" y="${CB+30}" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">受風面積 A (m²)</text>
    <text x="${CL-40}" y="${(CT+CB)/2}" text-anchor="middle" font-size="11" fill="#374151" font-weight="600" transform="rotate(-90,${CL-40},${(CT+CB)/2})">(GCp)</text>
    ${labels}
  </svg></div>
  <div style="font-size:.75rem;color:#64748b;margin-top:4px">● 橘點為本次計算值；曲線為規範圖之對數內插重建</div>
  </div>`;
}

function calcCC_Fig31a(){
  const h=parseFloat(document.getElementById('cc_h').value);
  const minW=parseFloat(document.getElementById('cc_minW').value);
  const A=parseFloat(document.getElementById('cc_A').value);
  if(isNaN(h)||isNaN(minW)||isNaN(A)) throw new Error('請填入所有必要參數');
  if(h>18) throw new Error('圖3.1(a) 僅適用於 h ≦ 18 m，h > 18 m 請使用圖3.2');
  if(A<0.5||A>100) throw new Error('有效受風面積 A 應在 0.5 ~ 100 m² 範圍內');
  let a=Math.min(0.4*h,0.1*minW);
  const aMin=Math.max(0.9,0.04*minW);
  if(a<aMin) a=aMin;
  const gcpi=getGCpi();

  // 依解析公式計算
  const z4_neg=gcp31a_zone4_neg(A);
  const z5_neg=gcp31a_zone5_neg(A);
  const z45_pos=gcp31a_pos(A);

  // 判斷落在哪個區段
  const logA=Math.log10(A);
  let z4_formula, z5_formula, pos_formula, segLabel;
  if(A<=1){
    segLabel='A ≦ 1 m²（常數段）';
    z4_formula=`(GCp) = -2.2913`;
    z5_formula=`(GCp) = -2.9162`;
    pos_formula=`(GCp) = +2.0830`;
  } else if(A<50){
    segLabel=`1 < A < 50 m²（對數線性段，log₁₀(${A}) = ${logA.toFixed(4)}）`;
    z4_formula=`(GCp) = 0.3678 × ${logA.toFixed(4)} - 2.2913 = ${f3(z4_neg)}`;
    z5_formula=`(GCp) = 0.7356 × ${logA.toFixed(4)} - 2.9162 = ${f3(z5_neg)}`;
    pos_formula=`(GCp) = -0.3678 × ${logA.toFixed(4)} + 2.0830 = ${f3(z45_pos)}`;
  } else {
    segLabel='A ≧ 50 m²（常數段）';
    z4_formula=`(GCp) = -1.6664`;
    z5_formula=`(GCp) = -1.6664`;
    pos_formula=`(GCp) = +1.4581`;
  }

  const sel=zoneValidate();
  const zones=[
    {key:'z5',name:'⑤ 角隅區（端部 a = '+a.toFixed(2)+' m）',neg:z5_neg,pos:z45_pos},
    {key:'z4',name:'④ 中央區',neg:z4_neg,pos:z45_pos},
  ];

  // 公式區段表
  const formulaTable=`<div class="formula-box" style="margin-top:10px">
    <b>📐 圖3.1(a) 解析公式計算過程（A = ${A} m²，${segLabel}）</b>
    <table class="result-table" style="margin-top:8px;font-size:.82rem">
      <thead><tr><th>曲線</th><th>本次適用公式（${segLabel}）</th><th>計算結果</th></tr></thead>
      <tbody>
        <tr><td>⑤ 角隅區 負壓</td>
          <td style="font-family:monospace">${A<=1?'(GCp) = -2.9162':A<50?'(GCp) = 0.7356×log₁₀(A) - 2.9162':'(GCp) = -1.6664'}</td>
          <td class="cp-neg"><b>${z5_formula}</b></td></tr>
        <tr><td>④ 中央區 負壓</td>
          <td style="font-family:monospace">${A<=1?'(GCp) = -2.2913':A<50?'(GCp) = 0.3678×log₁₀(A) - 2.2913':'(GCp) = -1.6664'}</td>
          <td class="cp-neg"><b>${z4_formula}</b></td></tr>
        <tr><td>④&⑤ 正壓</td>
          <td style="font-family:monospace">${A<=1?'(GCp) = +2.0830':A<50?'(GCp) = -0.3678×log₁₀(A) + 2.0830':'(GCp) = +1.4581'}</td>
          <td class="cp-pos"><b>${pos_formula}</b></td></tr>
      </tbody>
    </table>
    <small style="color:#64748b">公式來源：建築物耐風設計規範 圖3.1(a) 曲線方程式</small>
  </div>`;

  return calcCC_GCp_output(zones,gcpi,'圖3.1(a) 外牆（h ≦ 18 m）',a,A,null,sel)+
    formulaTable+
    `<div class="note-box"><b>附註：</b>當 θ ≦ 10° 時，牆之外風壓係數可降低 10%</div>`;
}

          <td class="cp-pos"><b>${fpos}</b></td></tr>
      </tbody>
    </table>
    <small style="color:#64748b">公式來源：建築物耐風設計規範 圖3.1(d) 曲線方程式</small>
  </div>`;

  return calcCC_GCp_output(zones,gcpi,'圖3.1(d) 27° < θ ≦ 45° 屋頂（h ≦ 18 m）',a,A,null,sel)+formulaTable;
}

function calcCC_Fig32(){
  const h=parseFloat(document.getElementById('cc_h').value);
  const minW=parseFloat(document.getElementById('cc_minW').value);
  const A=parseFloat(document.getElementById('cc_A').value);
  if(isNaN(h)||isNaN(minW)||isNaN(A)) throw new Error('請填入所有必要參數');
  if(h<=18) throw new Error('圖3.2 適用於 h > 18 m，h ≦ 18 m 請使用圖3.1');
  if(A<0.5||A>100) throw new Error('有效受風面積 A 應在 0.5 ~ 100 m² 範圍內');
  const a=Math.max(0.9,0.1*minW);
  const gcpi=getGCpi();

  const r1n =gcp32_z1_neg(A);
  const r2n =gcp32_z2_neg(A);
  const r3n =gcp32_z3_neg(A);
  const r4n =gcp32_z4_neg(A);
  const r5n =gcp32_z5_neg(A);
  const r45p=gcp32_z45_pos(A);

  const logA=Math.log10(A);

  // 屋頂分段說明（A=1/50）
  let roofSeg, f1n, f2n, f3n;
  if(A<=1){
    roofSeg='A ≦ 1 m²';
    f1n=`(GCp) = -2.9162`;
    f2n=`(GCp) = -4.7909`;
    f3n=`(GCp) = -6.6656`;
  } else if(A<50){
    roofSeg=`1 < A < 50 m²（log₁₀(${A}) = ${logA.toFixed(4)}）`;
    f1n=`0.6130 × ${logA.toFixed(4)} - 2.9162 = ${f3(r1n)}`;
    f2n=`0.8582 × ${logA.toFixed(4)} - 4.7909 = ${f3(r2n)}`;
    f3n=`1.1034 × ${logA.toFixed(4)} - 6.6656 = ${f3(r3n)}`;
  } else {
    roofSeg='A ≧ 50 m²';
    f1n=`(GCp) = -1.8747`;
    f2n=`(GCp) = -3.3328`;
    f3n=`(GCp) = -4.7909`;
  }

  // 外牆分段說明（A=2/50）
  let wallSeg, f4n, f5n, f45p;
  if(A<=2){
    wallSeg='A ≦ 2 m²';
    f4n =`(GCp) = -1.8747`;
    f5n =`(GCp) = -3.7494`;
    f45p=`(GCp) = +1.8747`;
  } else if(A<50){
    wallSeg=`2 < A < 50 m²（log₁₀(${A}) = ${logA.toFixed(4)}）`;
    f4n =`0.2980 × ${logA.toFixed(4)} - 1.9644 = ${f3(r4n)}`;
    f5n =`1.1920 × ${logA.toFixed(4)} - 4.1082 = ${f3(r5n)}`;
    f45p=`-0.4470 × ${logA.toFixed(4)} + 2.0093 = ${f3(r45p)}`;
  } else {
    wallSeg='A ≧ 50 m²';
    f4n =`(GCp) = -1.4581`;
    f5n =`(GCp) = -2.083`;
    f45p=`(GCp) = +1.2498`;
  }

  const sel=zoneValidate();
  const zones=[
    {key:'r1',name:'屋頂 ① 中央區',neg:r1n,pos:0},
    {key:'r2',name:'屋頂 ② 邊緣帶（2a = '+(2*a).toFixed(2)+' m）',neg:r2n,pos:0},
    {key:'r3',name:'屋頂 ③ 角隅（2a×2a）',neg:r3n,pos:0},
    {key:'w4',name:'外牆 ④ 中央牆面',neg:r4n,pos:r45p},
    {key:'w5',name:'外牆 ⑤ 角隅牆（a = '+a.toFixed(2)+' m）',neg:r5n,pos:r45p},
  ];

  const formulaTable=`<div class="formula-box" style="margin-top:10px">
    <b>📐 圖3.2 解析公式計算過程（A = ${A} m²）</b>
    <table class="result-table" style="margin-top:8px;font-size:.82rem">
      <thead><tr><th>曲線</th><th>本次適用公式</th><th>計算結果</th></tr></thead>
      <tbody>
        <tr><td colspan="3" style="background:#eff6ff;font-weight:700;color:#1a56db">屋頂（${roofSeg}）</td></tr>
        <tr><td>① 中央區 負壓</td>
          <td style="font-family:monospace">${A<=1?'(GCp) = -2.9162':A<50?'(GCp) = 0.6130×log₁₀(A) - 2.9162':'(GCp) = -1.8747'}</td>
          <td class="cp-neg"><b>${f1n}</b></td></tr>
        <tr><td>② 邊緣帶 負壓</td>
          <td style="font-family:monospace">${A<=1?'(GCp) = -4.7909':A<50?'(GCp) = 0.8582×log₁₀(A) - 4.7909':'(GCp) = -3.3328'}</td>
          <td class="cp-neg"><b>${f2n}</b></td></tr>
        <tr><td>③ 角隅 負壓</td>
          <td style="font-family:monospace">${A<=1?'(GCp) = -6.6656':A<50?'(GCp) = 1.1034×log₁₀(A) - 6.6656':'(GCp) = -4.7909'}</td>
          <td class="cp-neg"><b>${f3n}</b></td></tr>
        <tr><td colspan="3" style="background:#eff6ff;font-weight:700;color:#1a56db">外牆（${wallSeg}）</td></tr>
        <tr><td>④ 中央牆面 負壓</td>
          <td style="font-family:monospace">${A<=2?'(GCp) = -1.8747':A<50?'(GCp) = 0.2980×log₁₀(A) - 1.9644':'(GCp) = -1.4581'}</td>
          <td class="cp-neg"><b>${f4n}</b></td></tr>
        <tr><td>⑤ 角隅牆 負壓</td>
          <td style="font-family:monospace">${A<=2?'(GCp) = -3.7494':A<50?'(GCp) = 1.1920×log₁₀(A) - 4.1082':'(GCp) = -2.083'}</td>
          <td class="cp-neg"><b>${f5n}</b></td></tr>
        <tr><td>④⑤ 共用 正壓</td>
          <td style="font-family:monospace">${A<=2?'(GCp) = +1.8747':A<50?'(GCp) = -0.4470×log₁₀(A) + 2.0093':'(GCp) = +1.2498'}</td>
          <td class="cp-pos"><b>${f45p}</b></td></tr>
      </tbody>
    </table>
    <small style="color:#64748b">公式來源：建築物耐風設計規範 圖3.2 曲線方程式</small>
  </div>`;

  return calcCC_GCp_output(zones,gcpi,'圖3.2 外牆與屋頂（h > 18 m）',a,A,null,sel)+
    formulaTable+
    `<div class="note-box"><b>附註：</b>若 θ > 10°，設計屋頂所用 (GCp) 應由圖3.1(c)或圖3.1(d)決定，不使用圖3.2之屋頂數值</div>`;
}

// interp33: returns interpolated row {lt_a2:[z3p,z3n,z2p,z2n,z1p,z1n], mid:[...], gt_4a2:[...]}
// Also returns lower/upper theta rows for display
function interp33(table, theta, blockType){
  const arr=table[blockType];
  const interpRow=(rLow, rHigh, t)=>{
    const interpArr=(k)=>rLow[k].map((v,i)=>v+t*(rHigh[k][i]-v));
    return {lt_a2:interpArr('lt_a2'),mid:interpArr('mid'),gt_4a2:interpArr('gt_4a2')};
  };
  if(theta<=arr[0].theta) return {d:arr[0], tLow:arr[0].theta, tHigh:arr[0].theta, dLow:arr[0], dHigh:arr[0], isExact:true};
  if(theta>=arr[arr.length-1].theta) return {d:arr[arr.length-1], tLow:arr[arr.length-1].theta, tHigh:arr[arr.length-1].theta, dLow:arr[arr.length-1], dHigh:arr[arr.length-1], isExact:true};
  for(let i=0;i<arr.length-1;i++){
    if(theta>=arr[i].theta&&theta<=arr[i+1].theta){
      const t=(theta-arr[i].theta)/(arr[i+1].theta-arr[i].theta);
      const isExact=(t===0||t===1);
      return {d:interpRow(arr[i],arr[i+1],t), tLow:arr[i].theta, tHigh:arr[i+1].theta, dLow:arr[i], dHigh:arr[i+1], isExact, t};
    }
  }
  return {d:arr[arr.length-1], tLow:arr[arr.length-1].theta, tHigh:arr[arr.length-1].theta, dLow:arr[arr.length-1], dHigh:arr[arr.length-1], isExact:true};
}

// Helper: get zone value from row array [z3p,z3n,z2p,z2n,z1p,z1n]
// zone=3→idx 0,1; zone=2→idx 2,3; zone=1→idx 4,5
function zoneVal(rowArr, zone){ const b=(3-zone)*2; return {pos:rowArr[b],neg:rowArr[b+1]}; }
// area key from A vs aSquare
function areaKey(A, aSquare){ return A<=aSquare?'lt_a2':(A<=4*aSquare?'mid':'gt_4a2'); }
function areaLabel(A, aSquare){ return A<=aSquare?`A ≦ a²`:(A<=4*aSquare?`a² < A ≦ 4a²`:`A > 4a²`); }
function areaLabelFull(A, aSquare){ return A<=aSquare?`A ≦ a² = ${aSquare.toFixed(2)} m²`:(A<=4*aSquare?`a² < A ≦ 4a² = ${(4*aSquare).toFixed(2)} m²`:`A > 4a² = ${(4*aSquare).toFixed(2)} m²`); }

function calcCC_Fig33(tableData, figLabel){
  const h=parseFloat(document.getElementById('cc33_h').value);
  const L=parseFloat(document.getElementById('cc33_L').value);
  const minW=parseFloat(document.getElementById('cc33_minW').value);
  const A=parseFloat(document.getElementById('cc33_A').value);
  const theta=parseFloat(document.getElementById('cc33_theta').value);
  const blockType=document.getElementById('cc33_block').value;
  const sel=zoneValidate();
  if([h,L,minW,A,theta].some(isNaN)) throw new Error('請填入所有必要參數');
  if(theta<0||theta>45) throw new Error('θ 應介於 0° ~ 45°');
  const hL=h/L;
  if(hL<0.25||hL>1) throw new Error(`h/L = ${hL.toFixed(3)}，不滿足 0.25 ≦ h/L ≦ 1 之使用條件`);
  const a=Math.max(0.9,0.1*minW);
  const aSquare=a*a;
  const blockLabel=blockType==='unblock'?'屋頂下無阻擋':'屋頂下有阻擋';
  const key=areaKey(A,aSquare);
  const zFull=areaLabelFull(A,aSquare);
  const zShort=areaLabel(A,aSquare);

  const {d, tLow, tHigh, dLow, dHigh, isExact} = interp33(tableData, theta, blockType);

  // Values for all zones at actual A bracket
  const z3=zoneVal(d[key],3), z2=zoneVal(d[key],2), z1=zoneVal(d[key],1);

  // Zone name map for selected zone label
  const zoneNames={z3:'區域3（角隅）',z2:'區域2（邊緣）',z1:'區域1（中央）',all:'全部區域'};
  const selLabel=zoneNames[sel]||'全部區域';

  // Build result section: selected zone(s) only
  const allZoneData=[
    {key:'z3', label:'區域3（角隅）', data:z3, bg:'#fecaca'},
    {key:'z2', label:'區域2（邊緣）', data:z2, bg:'#fef08a'},
    {key:'z1', label:'區域1（中央）', data:z1, bg:'#bbf7d0'},
  ];
  const displayZones = (sel==='all') ? allZoneData : allZoneData.filter(z=>z.key===sel);

  let selectedRows='';
  displayZones.forEach(z=>{
    selectedRows+=`<tr>
      <td style="background:${z.bg}20"><b>${z.label}</b><br><small>${zFull}</small></td>
      <td class="cp-neg"><b>${f3(z.data.neg)}</b></td>
      <td class="cp-pos"><b>+${f3(z.data.pos)}</b></td>
    </tr>`;
  });

  // Build interpolation detail if needed
  let interpDetail='';
  if(!isExact){
    const tRatio=((theta-tLow)/(tHigh-tLow)*100).toFixed(1);
    const lo3=zoneVal(dLow[key],3), lo2=zoneVal(dLow[key],2), lo1=zoneVal(dLow[key],1);
    const hi3=zoneVal(dHigh[key],3), hi2=zoneVal(dHigh[key],2), hi1=zoneVal(dHigh[key],1);
    const showAll=(sel==='all');
    const td=(show,neg,pos,bold)=>show?('<td'+(bold?' style="font-weight:700"':'')+'>'+f3(neg)+' / +'+f3(pos)+'</td>'):'';
    const th3=showAll||sel==='z3', th2=showAll||sel==='z2', th1=showAll||sel==='z1';
    interpDetail=`<div class="formula-box" style="margin-top:10px">
      <b>📏 θ = ${theta}° 線性內插計算過程（${zShort}）</b><br>
      <small>內插比例 t = (${theta} - ${tLow}) / (${tHigh} - ${tLow}) = ${tRatio}%</small>
      <table class="result-table" style="margin-top:8px;font-size:.82rem">
        <thead><tr><th>θ（插值依據）</th>
          ${th3?'<th>區域3 Cpn（負/正）</th>':''}
          ${th2?'<th>區域2 Cpn（負/正）</th>':''}
          ${th1?'<th>區域1 Cpn（負/正）</th>':''}
        </tr></thead>
        <tbody>
          <tr><td>θ = ${tLow}°（表列下限）</td>
            ${td(th3,lo3.neg,lo3.pos,false)}
            ${td(th2,lo2.neg,lo2.pos,false)}
            ${td(th1,lo1.neg,lo1.pos,false)}
          </tr>
          <tr><td>θ = ${tHigh}°（表列上限）</td>
            ${td(th3,hi3.neg,hi3.pos,false)}
            ${td(th2,hi2.neg,hi2.pos,false)}
            ${td(th1,hi1.neg,hi1.pos,false)}
          </tr>
          <tr class="highlight"><td>θ = ${theta}°（內插結果）</td>
            ${td(th3,z3.neg,z3.pos,true)}
            ${td(th2,z2.neg,z2.pos,true)}
            ${td(th1,z1.neg,z1.pos,true)}
          </tr>
        </tbody>
      </table>
    </div>`;
  }

  const thetaNote = isExact
    ? `θ = ${theta}°（直接查表）`
    : `θ = ${theta}°（由 θ=${tLow}° 與 θ=${tHigh}° 線性內插）`;

  return `<div class="formula-box">
    <h4>📐 ${figLabel} 淨風壓係數 Cpn 查詢結果</h4>
    <span class="formula">h = ${h} m　│　L = ${L} m　│　h/L = ${hL.toFixed(3)}　│　a = ${a.toFixed(3)} m　│　A = ${A} m²</span>
    <small>${blockLabel}　│　${thetaNote}　│　${zFull}　│　查詢區域：<b>${selLabel}</b></small>
  </div>
  <table class="result-table">
    <thead><tr><th>區域</th><th>Cpn 負值（吸力）</th><th>Cpn 正值（壓力）</th></tr></thead>
    <tbody>${selectedRows}</tbody>
  </table>
  ${interpDetail}
  <div class="note-box">
    ✅ <b>正值</b>：壓力指向表面；<b>負值</b>：壓力遠離表面<br>
    設計風壓公式：<b>p = q(h) × G × Cpn</b>（G 採普通建築物陣風反應因子，依 2.7 節）<br>
    每個部分應依最大正負壓力設計
  </div>`;
}

function calcCC_Fig33a(){ return calcCC_Fig33(CC_33a,'圖3.3(a) 單斜屋頂（開放式建築物）'); }
function calcCC_Fig33b(){ return calcCC_Fig33(CC_33b,'圖3.3(b) 雙斜屋頂（開放式建築物）'); }

function numInput(id,label,unit,min,max,step,val,hint){
  const unitHtml = unit ? ' <span style="color:#64748b;font-weight:400">('+unit+')</span>' : '';
  const hintHtml = hint ? '<div style="font-size:.75rem;color:#6b7280;margin-bottom:4px">'+hint+'</div>' : '';
  return '<div><label for="'+id+'">'+label+unitHtml+'</label>'+hintHtml+
    '<input type="number" id="'+id+'" min="'+(min||'')+'" max="'+(max||'')+'" step="'+(step||'any')+'" value="'+(val||'')+'" placeholder="請輸入數值"></div>';
}
function selInput(id,label,options){
  const opts = options.map(o=>'<option value="'+o.v+'">'+o.t+'</option>').join('');
  return '<div><label for="'+id+'">'+label+'</label><select id="'+id+'"><option value="">-- 請選擇 --</option>'+opts+'</select></div>';
}

// ========== CALCULATION ==========
function calculate(){
  const res=document.getElementById('resultCard');
  const rc=document.getElementById('resultContent');
  let html='';
  let hasError=false;

  try{
    switch(currentComponent){
      case 'wall': html=calcWall(); break;
      case 'flat_roof': html=calcFlatRoof(); break;
      case 'arch_roof': html=calcArchRoof(); break;
      case 'dual_roof': html=calcDualRoof(); break;
      case 'sawtooth': html=calcSawtooth(); break;
      case 'open_mono': html=calcOpenMono(); break;
      case 'solid_sign': html=calcSolidSign(); break;
      case 'open_sign': html=calcOpenSign(); break;
      case 'chimney': html=calcChimney(); break;
      case 'prism': html=calcPrism(); break;
      case 'cable': html=calcCable(); break;
      case 'truss': html=calcTruss(); break;
      case 'guy_wire': html=calcGuyWire(); break;
      case 'internal': html=calcInternal(); break;
      // CC figures (局部構件及外部被覆物)
      case 'cc_fig31a': html=calcCC_Fig31a(); break;
      case 'cc_fig31b': html=calcCC_Fig31b(); break;
      case 'cc_fig31c': html=calcCC_Fig31c(); break;
      case 'cc_fig31d': html=calcCC_Fig31d(); break;
      case 'cc_fig32':  html=calcCC_Fig32(); break;
      case 'cc_fig33a': html=calcCC_Fig33a(); break;
      case 'cc_fig33b': html=calcCC_Fig33b(); break;
      default: html='<p>尚未實作</p>';
    }
    // Always append internal pressure for enclosed/partial (MWFRS components only)
    if(currentSystemType!=='cc' && ['wall','flat_roof','arch_roof','dual_roof','sawtooth'].includes(currentComponent)){
      html += internalPressureSection();
    }
    // For CC enclosed/partial, show GCpi at bottom
    if(currentSystemType==='cc' && ['cc_fig31a','cc_fig31b','cc_fig31c','cc_fig31d','cc_fig32'].includes(currentComponent)){
      html += internalPressureSection();
    }
  }catch(e){
    html=`<div class="note-box">⚠️ 計算錯誤：${e.message}</div>`;
    hasError=true;
  }

  rc.innerHTML=html;
  res.classList.add('show');

  // 若計算錯誤：不切換步驟、不捲動、不回傳
  if(hasError){
    return;
  }

  setStep(4);
  res.scrollIntoView({behavior:'smooth'});

  // 回傳結果至整合式父頁面
  if (window.parent !== window) {
    const compDef = (COMPONENTS[currentBuilding]||[]).find(c=>c.value===currentComponent);
    let label = compDef ? compDef.label : currentComponent;
    let tableRef = compDef ? '表'+compDef.table : '';
    const buildingLabels = {enclosed:'封閉式建築物', partial:'部分封閉式建築物', open:'開放式建築物'};

    // 取得 GCpi（封閉/部分封閉才有）
    let gcpi = null;
    const gcpiRow = DB.table_2_17.find(r=>
      (currentBuilding==='enclosed'&&r.type==='封閉式建築')||
      (currentBuilding==='partial'&&r.type==='部分封閉式建築')||
      (currentBuilding==='open'&&r.type==='開放式建築')
    );
    if (gcpiRow) gcpi = {pos: gcpiRow.pos, neg: gcpiRow.neg};

    // 各構件係數擷取
    let coefficients = [];
    let inputs = [];
    try {
      switch(currentComponent) {
        case 'wall': {
          const L=val('inp_L'), B=val('inp_B'), LB=L/B;
          let cpLee;
          if(LB<=1) cpLee=-0.5;
          else if(LB<=2) cpLee=-0.5+(-0.3+0.5)*(LB-1);
          else if(LB<=4) cpLee=-0.3+(-0.2+0.3)/(2)*(LB-2);
          else cpLee=-0.2;
          inputs = [
            {label:'L（平行風向）', value:L+' m'},
            {label:'B（垂直風向）', value:B+' m'},
            {label:'L/B', value:LB.toFixed(2)},
          ];
          coefficients = [
            {face:'迎風面', coef:'Cp', value:+0.8, note:'q(z)'},
            {face:'背風面', coef:'Cp', value:parseFloat(cpLee.toFixed(3)), note:'q(h), L/B='+LB.toFixed(2)},
            {face:'側風面', coef:'Cp', value:-0.7, note:'q(h)'},
          ];
          break;
        }
        case 'flat_roof': {
          const h=val('inp_h'),L=val('inp_L'),theta=val('inp_theta')||0,B=val('inp_B');
          const hL=h/L;
          const getRowCp2=(row,th)=>{
            if(th===0) return {pos:row[3],neg:null};
            if(th<=15){ if(row[4]!==null&&row[5]!==null) return {pos:row[4],neg:row[5]}; return {pos:row[4],neg:null}; }
            if(th<=20) return {pos:row[6],neg:null};
            if(th<=30) return {pos:row[7],neg:null};
            if(th<=40) return {pos:row[8],neg:null};
            if(th<=50) return {pos:row[9],neg:null};
            return {pos:0.01*th,neg:null};
          };
          const rowsPerp=DB.table_2_5_roof.rows.filter(r=>r[1]==='垂直於屋脊');
          let hLRow;
          if(hL<=0.3) hLRow=rowsPerp[0];
          else if(hL<=0.5) hLRow=rowsPerp[1];
          else if(hL<=1.0) hLRow=rowsPerp[2];
          else hLRow=rowsPerp[3];
          const cpRes=getRowCp2(hLRow,theta);
          const cpLee=hLRow[11];
          const hB = B && !isNaN(B) ? h/B : hL;
          const cpPara = hB<=2.5 ? -0.7 : -0.8;
          inputs = [
            {label:'h（平均屋頂高度）', value:h+' m'},
            {label:'L（平行風向）', value:L+' m'},
            {label:'B（垂直風向）', value:B&&!isNaN(B)?B+' m':'未輸入'},
            {label:'θ（屋面傾角）', value:theta+'°'},
            {label:'h/L', value:hL.toFixed(2)+' → 使用列 '+hLRow[2]},
            {label:'h/B', value:B&&!isNaN(B)?(h/B).toFixed(2):'—'},
          ];
          coefficients = [
            {face:'迎風面屋頂（垂直屋脊）', coef:'Cp', value:cpRes.pos, note:'q(h)'},
            ...(cpRes.neg!==null ? [{face:'迎風面屋頂（垂直屋脊）', coef:'Cp', value:cpRes.neg, note:'q(h)，需與正值同時考慮'}] : []),
            {face:'背風面屋頂（垂直屋脊）', coef:'Cp', value:cpLee, note:'q(h)，所有θ及h/L'},
            {face:'迎風面及背風面（平行屋脊）', coef:'Cp', value:cpPara, note:'q(h)，h/B '+(hB<=2.5?'≦':'＞')+' 2.5'},
          ];
          break;
        }
        case 'arch_roof': {
          const archType=selVal('inp_archType');
          const r=parseFloat(document.getElementById('inp_r').value);
          const archTypeLabel = archType==='wall' ? '牆上（拱腳在牆上）' : '地面支撐';
          let cpWind;
          if(archType==='wall'){
            if(r<0.2) cpWind=-0.9;
            else if(r<0.3) cpWind=1.5*r-0.3;
            else cpWind=2.75*r-0.7;
          } else cpWind=1.4*r;
          const cpCenter=-0.7-r;
          inputs = [
            {label:'支承形式', value:archTypeLabel},
            {label:'r（拱高/跨度）', value:r},
          ];
          coefficients = [
            {face:'迎風面 P（各佔1/4跨）', coef:'Cp', value:parseFloat(cpWind.toFixed(4)), note:'q(h)'},
            {face:'中央部分 Q（佔1/2跨）', coef:'Cp', value:parseFloat(cpCenter.toFixed(4)), note:'q(h)'},
            {face:'背風面 P（各佔1/4跨）', coef:'Cp', value:-0.5, note:'q(h)'},
          ];
          break;
        }
        case 'dual_roof': {
          const h=val('inp_h'),L=val('inp_L'),theta=val('inp_theta');
          inputs = [
            {label:'h（平均屋頂高度）', value:h+' m'},
            {label:'L（平行風向）', value:L+' m'},
            {label:'θ（屋面傾角）', value:theta+'°'},
            {label:'h/L', value:(h/L).toFixed(2)},
          ];
          coefficients = [
            {face:'迎風面 W', coef:'Cp', value:'查表2.5迎風面', note:''},
            {face:'背風面 L', coef:'Cp', value:-0.7, note:'q(h)'},
            {face:'中央部分 C', coef:'Cp', value:-0.7, note:'q(h)'},
          ];
          break;
        }
        case 'sawtooth': {
          const theta=val('inp_theta'), h=val('inp_h');
          inputs = [
            {label:'h（平均屋頂高度）', value:h+' m'},
            {label:'θ（屋面傾角）', value:theta+'°'},
          ];
          coefficients = [
            {face:'第一迎風面 D', coef:'Cp', value:'查表2.5迎風面', note:''},
            {face:'第一背風面 E', coef:'Cp', value:'查表2.5背風面', note:''},
            {face:"第二迎風面 D'", coef:'Cp', value:'查表2.5背風面', note:''},
            {face:"第二背風面 E'", coef:'Cp', value:-0.5, note:''},
            {face:"第三迎風面 D\"", coef:'Cp', value:-0.5, note:''},
            {face:"第三背風面 E\"", coef:'Cp', value:-0.4, note:''},
            {face:'其餘', coef:'Cp', value:-0.3, note:'q(h)'},
          ];
          break;
        }
        case 'open_mono': {
          const theta=val('inp_theta_m'), L=val('inp_L_m'), B=val('inp_B_m');
          const LB=L/B;
          const data=DB.table_2_9.data;
          const thetas=[10,15,20,25,30];
          const interpTheta=(th)=>{
            const lbKs=Object.keys(data[th]).map(Number);
            let lbLow=lbKs[0],lbHigh=lbKs[lbKs.length-1];
            for(let lb of lbKs){if(lb<=LB)lbLow=lb;}
            for(let lb of [...lbKs].reverse()){if(lb>=LB)lbHigh=lb;}
            if(lbLow===lbHigh) return data[th][lbLow];
            return data[th][lbLow]+(data[th][lbHigh]-data[th][lbLow])/(lbHigh-lbLow)*(LB-lbLow);
          };
          let thLow=10,thHigh=30;
          for(let t of thetas){if(t<=theta)thLow=t;}
          for(let t of [...thetas].reverse()){if(t>=theta)thHigh=t;}
          let cf;
          if(thLow===thHigh) cf=interpTheta(thLow);
          else { const cfL=interpTheta(thLow),cfH=interpTheta(thHigh); cf=cfL+(cfH-cfL)/(thHigh-thLow)*(theta-thLow); }
          inputs = [
            {label:'θ（屋面傾角）', value:theta+'°'},
            {label:'L（平行風向）', value:L+' m'},
            {label:'B（垂直風向）', value:B+' m'},
            {label:'L/B', value:LB.toFixed(2)},
          ];
          coefficients = [{face:'屋頂', coef:'Cf', value:parseFloat(cf.toFixed(3)), note:'θ='+theta+'°, L/B='+LB.toFixed(2)}];
          break;
        }
        case 'solid_sign': {
          const loc=selVal('inp_signLoc'), ratio=val('inp_signRatio');
          const data_g=[[3,1.2],[5,1.3],[8,1.4],[10,1.5],[20,1.75],[30,1.85],[40,2.0]];
          const data_e=[[6,1.2],[10,1.3],[16,1.4],[20,1.5],[40,1.75],[60,1.85],[80,2.0]];
          const arr=loc==='ground'?data_g:data_e;
          let lo=arr[0],hi=arr[arr.length-1];
          for(let r of arr){if(r[0]<=ratio)lo=r;}
          for(let r of [...arr].reverse()){if(r[0]>=ratio)hi=r;}
          const cf=lo===hi?lo[1]:lo[1]+(hi[1]-lo[1])/(hi[0]-lo[0])*(ratio-lo[0]);
          inputs = [
            {label:'位置', value:loc==='ground'?'地面上':'地面以上'},
            {label:loc==='ground'?'高寬比 ν':'M/N', value:ratio},
          ];
          coefficients = [{face:'標示物', coef:'Cf', value:parseFloat(cf.toFixed(3)), note:''}];
          break;
        }
        case 'open_sign': {
          const secType=selVal('inp_secType'), eps=val('inp_solidity');
          const rows=[[0,0.1,2.0,1.2,0.8],[0.1,0.29,1.8,1.3,0.9],[0.3,0.7,1.6,1.5,1.1]];
          let row=rows.find(r=>eps>=r[0]&&eps<=r[1])||rows[rows.length-1];
          const cf=secType==='flat'?row[2]:secType==='round_low'?row[3]:row[4];
          const secLabel=secType==='flat'?'平邊構材':secType==='round_low'?'圓形 D√q≦1.70':'圓形 D√q>1.70';
          inputs = [
            {label:'斷面形式', value:secLabel},
            {label:'ε（實體比）', value:eps},
          ];
          coefficients = [{face:'構架', coef:'Cf', value:cf, note:'ε='+eps}];
          break;
        }
        case 'chimney': {
          const shape=selVal('inp_chimShape'),h=val('inp_h_c'),D=val('inp_D_c');
          const hD=h/D;
          const shapeMap={'sq_perp':{idx:0},'sq_diag':{idx:1},'hex_oct':{idx:2},'circ_low_smooth':{idx:3},'circ_low_rough':{idx:4},'circ_low_vrough':{idx:5},'circ_high':{idx:6}};
          const row=DB.table_2_12[shapeMap[shape].idx];
          let cf;
          if(hD<=1) cf=row.cf[0];
          else if(hD<=7) cf=row.cf[0]+(row.cf[1]-row.cf[0])/6*(hD-1);
          else if(hD<=25) cf=row.cf[1]+(row.cf[2]-row.cf[1])/18*(hD-7);
          else cf=row.cf[2];
          inputs = [
            {label:'形狀', value:row.shape+' '+row.surf},
            {label:'h（高度）', value:h+' m'},
            {label:'D（直徑/邊長）', value:D+' m'},
            {label:'h/D', value:hD.toFixed(2)},
          ];
          coefficients = [{face:row.shape+' '+row.surf, coef:'Cf', value:parseFloat(cf.toFixed(3)), note:'h/D='+hD.toFixed(2)}];
          break;
        }
        case 'prism': {
          const shape=selVal('inp_prismShape'),h=val('inp_h_p'),D=val('inp_D_p');
          const cfMap={rect_long:2.2,rect_short:1.4,tri_vert:1.2,tri_face:2.0,right_tri:1.55};
          const shapeLabels={rect_long:'長方柱（長邊迎風）',rect_short:'長方柱（短邊迎風）',tri_vert:'三角柱（頂點迎風）',tri_face:'三角柱（斜面迎風）',right_tri:'直角三角柱'};
          const cf=cfMap[shape], ratio=2*h/D;
          let R=ratio<=4?0.6:ratio<=8?0.7:ratio<=40?0.8:1.0;
          inputs = [
            {label:'形狀', value:shapeLabels[shape]||shape},
            {label:'h（高度）', value:h+' m'},
            {label:'D（斷面尺寸）', value:D+' m'},
            {label:'2h/D', value:ratio.toFixed(2)},
            {label:'修正係數 R', value:R},
          ];
          coefficients = [
            {face:'柱體', coef:'Cf', value:cf, note:'基本值'},
            {face:'柱體（修正後）', coef:'Cf×R', value:parseFloat((cf*R).toFixed(3)), note:'R='+R+', 2h/D='+ratio.toFixed(2)},
          ];
          break;
        }
        case 'cable': {
          const surf=selVal('inp_cableSurf'),mode=selVal('inp_cableMode');
          const surfLabels={smooth:'光滑表面',medium:'中度粗糙',fine:'細粗糙',coarse:'粗糙'};
          const map={smooth:[1.2,0.5],medium:[1.2,0.7],fine:[1.2,0.9],coarse:[1.3,1.1]};
          const cf=mode==='low'?map[surf][0]:map[surf][1];
          inputs = [
            {label:'表面狀況', value:surfLabels[surf]||surf},
            {label:'D√q(z)', value:mode==='low'?'< 1.70':'≧ 1.70'},
          ];
          coefficients = [{face:'繩竿管', coef:'Cf', value:cf, note:mode==='low'?'D√q<1.70':'D√q≧1.70'}];
          break;
        }
        case 'truss': {
          const shape=selVal('inp_trussShape'),eps=val('inp_solidity_t');
          let cf;
          if(eps<0.025) cf=shape==='square'?4.0:3.6;
          else if(eps<=0.44) cf=shape==='square'?(4.1-5.2*eps):(3.7-4.5*eps);
          else if(eps<=0.69) cf=shape==='square'?1.8:1.7;
          else cf=shape==='square'?(1.3+0.7*eps):(1.0+eps);
          inputs = [
            {label:'形狀', value:shape==='square'?'方形高塔':'三角形高塔'},
            {label:'ε（實體比）', value:eps},
          ];
          coefficients = [{face:shape==='square'?'方形高塔':'三角形高塔', coef:'Cf', value:parseFloat(cf.toFixed(3)), note:'ε='+eps}];
          break;
        }
        case 'guy_wire': {
          const theta=val('inp_theta_g');
          const data=DB.table_2_16;
          let lo=data[0],hi=data[data.length-1];
          for(let r of data){if(r.theta<=theta)lo=r;}
          for(let r of [...data].reverse()){if(r.theta>=theta)hi=r;}
          let cd,cl;
          if(lo.theta===hi.theta){cd=lo.cd;cl=lo.cl;}
          else{cd=lo.cd+(hi.cd-lo.cd)/(hi.theta-lo.theta)*(theta-lo.theta);cl=lo.cl+(hi.cl-lo.cl)/(hi.theta-lo.theta)*(theta-lo.theta);}
          inputs = [{label:'θ（索與水平夾角）', value:theta+'°'}];
          coefficients = [
            {face:'拉固索', coef:'CD（順風向）', value:parseFloat(cd.toFixed(3)), note:'θ='+theta+'°'},
            {face:'拉固索', coef:'CL（橫風向）', value:parseFloat(cl.toFixed(3)), note:'θ='+theta+'°'},
          ];
          break;
        }
        case 'internal':
          inputs = [{label:'建築物類型', value:buildingLabels[currentBuilding]}];
          if(gcpiRow) coefficients = [
            {face:'所有牆內面', coef:'+GCpi', value:gcpiRow.pos, note:'正內風壓'},
            {face:'所有牆內面', coef:'-GCpi', value:gcpiRow.neg, note:'負內風壓'},
          ];
          break;

        // ── CC 圖形（局部構件及外部被覆物）──
        case 'cc_fig31a': case 'cc_fig31b': case 'cc_fig31c': case 'cc_fig31d': case 'cc_fig32': {
          const ccA=parseFloat(document.getElementById('cc_A').value);
          const ccH=parseFloat(document.getElementById('cc_h').value);
          const ccMinW=parseFloat(document.getElementById('cc_minW').value);
          const selZone=getSelectedZone();
          const figLabels={'cc_fig31a':'圖3.1(a) 外牆（h≦18m）','cc_fig31b':'圖3.1(b) θ≦7°屋頂（h≦18m）','cc_fig31c':'圖3.1(c) 7°<θ≦27°屋頂（h≦18m）','cc_fig31d':'圖3.1(d) 27°<θ≦45°屋頂（h≦18m）','cc_fig32':'圖3.2 外牆與屋頂（h>18m）'};
          label = figLabels[currentComponent]||currentComponent;
          tableRef = '圖'+currentComponent.replace('cc_fig','').replace(/(\d)(\d)/,'$1.$2');
          inputs = [
            {label:'有效受風面積 A', value:ccA+' m²'},
            {label:'平均屋頂高度 h', value:ccH+' m'},
            {label:'建築物最小寬度', value:ccMinW+' m'},
            {label:'查詢區域', value:selZone==='all'?'全部區域':selZone},
          ];
          // 依選擇區域與圖號擷取GCp值
          const gcpFns={
            'cc_fig31a':{z5:gcp31a_zone5_neg,z4:gcp31a_zone4_neg,pos:gcp31a_pos},
            'cc_fig31b':{z1:gcp31b_z1_neg,z2:gcp31b_z2_neg,z3:gcp31b_z3_neg,pos:gcp31b_pos},
            'cc_fig31c':{z1:gcp31c_z1_neg,z2:gcp31c_z2_neg,z3:gcp31c_z3_neg,pos:gcp31c_pos},
            'cc_fig31d':{z1:gcp31d_z1_neg,z23:gcp31d_z23_neg,pos:gcp31d_pos},
            'cc_fig32':{r1:gcp32_z1_neg,r2:gcp32_z2_neg,r3:gcp32_z3_neg,w4:gcp32_z4_neg,w5:gcp32_z5_neg,pos:gcp32_z45_pos},
          };
          const fns=gcpFns[currentComponent]||{};
          const zoneLabels31a={z5:'⑤角隅區',z4:'④中央區'};
          const zoneLabels31bcd={z1:'①中央區',z2:'②邊緣帶',z3:'③角隅區'};
          const zoneLabels31d={z1:'①中央區',z23:'②③邊緣及角隅'};
          const zoneLabels32={r1:'屋頂①中央',r2:'屋頂②邊緣',r3:'屋頂③角隅',w4:'外牆④中央',w5:'外牆⑤角隅'};
          let zLabels={};
          if(currentComponent==='cc_fig31a') zLabels=zoneLabels31a;
          else if(currentComponent==='cc_fig31d') zLabels=zoneLabels31d;
          else if(currentComponent==='cc_fig32') zLabels=zoneLabels32;
          else zLabels=zoneLabels31bcd;
          const posVal=fns.pos?fns.pos(ccA):null;
          // 圖3.2 屋頂區域（r1/r2/r3）無正壓，僅外牆（w4/w5）有正壓
          const roofOnlyZones=new Set(['r1','r2','r3']);
          Object.entries(zLabels).forEach(([k,lbl])=>{
            if((selZone==='all'||selZone===k)&&fns[k]){
              const negVal=parseFloat(fns[k](ccA).toFixed(4));
              // 僅在負壓值確實為負時回傳
              if(negVal<0) coefficients.push({face:lbl, coef:'(GCp)負壓', value:negVal, note:'A='+ccA+'m²'});
              // 正壓：屋頂僅負壓區域不回傳；posVal必須>0才回傳
              const hasPosZone = !(currentComponent==='cc_fig32' && roofOnlyZones.has(k));
              if(posVal!==null && posVal>0 && hasPosZone){
                coefficients.push({face:lbl, coef:'(GCp)正壓', value:parseFloat(posVal.toFixed(4)), note:'A='+ccA+'m²'});
              }
            }
          });
          // 附加GCpi
          if(gcpiRow){
            coefficients.push({face:'內壓（正）', coef:'+GCpi', value:gcpiRow.pos, note:'表2.17'});
            coefficients.push({face:'內壓（負）', coef:'-GCpi', value:gcpiRow.neg, note:'表2.17'});
          }
          break;
        }
        case 'cc_fig33a': case 'cc_fig33b': {
          const ccH33=parseFloat(document.getElementById('cc33_h').value);
          const ccL33=parseFloat(document.getElementById('cc33_L').value);
          const ccMinW33=parseFloat(document.getElementById('cc33_minW').value);
          const ccA33=parseFloat(document.getElementById('cc33_A').value);
          const ccTheta=parseFloat(document.getElementById('cc33_theta').value);
          const ccBlock=document.getElementById('cc33_block').value;
          const selZone33=getSelectedZone();
          const a33=Math.max(0.9,0.1*ccMinW33);
          const aSquare33=a33*a33;
          const key33=areaKey(ccA33,aSquare33);
          const tableData33=currentComponent==='cc_fig33a'?CC_33a:CC_33b;
          const {d:d33}=interp33(tableData33,ccTheta,ccBlock);
          const zLabel33={z3:'區域3（角隅）',z2:'區域2（邊緣）',z1:'區域1（中央）'};
          label = currentComponent==='cc_fig33a'?'圖3.3(a) 單斜屋頂（開放式）':'圖3.3(b) 雙斜屋頂（開放式）';
          tableRef = currentComponent==='cc_fig33a'?'圖3.3(a)':'圖3.3(b)';
          inputs = [
            {label:'平均屋頂高度 h', value:ccH33+' m'},
            {label:'順風向水平深度 L', value:ccL33+' m'},
            {label:'h/L', value:(ccH33/ccL33).toFixed(3)},
            {label:'有效受風面積 A', value:ccA33+' m²'},
            {label:'屋頂坡角 θ', value:ccTheta+'°'},
            {label:'阻擋狀況', value:ccBlock==='unblock'?'屋頂下無阻擋':'屋頂下有阻擋'},
            {label:'a 值', value:a33.toFixed(3)+' m'},
            {label:'查詢區域', value:selZone33==='all'?'全部區域':zLabel33[selZone33]||selZone33},
          ];
          ['z3','z2','z1'].forEach(zk=>{
            if(selZone33==='all'||selZone33===zk){
              const zNum={z3:3,z2:2,z1:1}[zk];
              const zv=zoneVal(d33[key33],zNum);
              coefficients.push({face:zLabel33[zk], coef:'Cpn 負壓', value:parseFloat(zv.neg.toFixed(4)), note:'θ='+ccTheta+'°'});
              coefficients.push({face:zLabel33[zk], coef:'Cpn 正壓', value:parseFloat(zv.pos.toFixed(4)), note:'θ='+ccTheta+'°'});
            }
          });
          break;
        }
      } // end switch(currentComponent)
      // 附加內風壓（主體結構構件）
      if(['wall','flat_roof','arch_roof','dual_roof','sawtooth'].includes(currentComponent) && gcpiRow) {
        coefficients.push({face:'內壓（正）', coef:'+GCpi', value:gcpiRow.pos, note:'表2.17'});
        coefficients.push({face:'內壓（負）', coef:'-GCpi', value:gcpiRow.neg, note:'表2.17'});
      }
    } catch(e2) { /* 擷取失敗不影響主流程 */ }

    window.parent.postMessage({
      source: 'wind_pressure_query',
      buildingType: currentBuilding,
      buildingLabel: buildingLabels[currentBuilding] || currentBuilding,
      component: currentComponent,
      componentLabel: label,
      tableRef: tableRef,
      inputs: inputs,
      coefficients: coefficients,
      gcpi: gcpi,
      timestamp: new Date().toISOString()
    }, '*');
  }
}

// ===== Calc Wall (Table 2.4) =====
function calcWall(){
  const L=val('inp_L'), B=val('inp_B');
  if(!L||!B) throw new Error('請輸入 L 和 B 值');
  const LB=L/B;

  // Leeward interpolation
  let cpLee;
  if(LB<=1) cpLee=-0.5;
  else if(LB<=2){
    cpLee=-0.5+(-0.3-(-0.5))/(2-1)*(LB-1);
  } else if(LB<=4){
    cpLee=-0.3+(-0.2-(-0.3))/(4-2)*(LB-2);
  } else cpLee=-0.2;

  const cpWind=0.8, cpSide=-0.7;

  return `
  <div class="formula-box">
    <h4>📐 表2.4 牆之外風壓係數（主要風力抵抗系統）</h4>
    <code class="formula">L = ${L} m，B = ${B} m，L/B = ${LB.toFixed(2)}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward">
      <div class="sc-label">迎風面 Cp</div>
      <div class="sc-value">+${cpWind.toFixed(1)}</div>
      <div class="sc-formula">使用 q(z)（隨高度變化）</div>
    </div>
    <div class="summary-card leeward">
      <div class="sc-label">背風面 Cp</div>
      <div class="sc-value">${cpLee.toFixed(2)}</div>
      <div class="sc-formula">使用 q(h)${LB>1&&LB<4?'　<span class="interp-tag">內插</span>':''}</div>
    </div>
    <div class="summary-card side">
      <div class="sc-label">側風面 Cp</div>
      <div class="sc-value">${cpSide.toFixed(1)}</div>
      <div class="sc-formula">使用 q(h)</div>
    </div>
  </div>
  <table class="result-table">
    <tr><th>所屬牆面</th><th>L/B</th><th>Cp</th><th>使用風速壓</th></tr>
    <tr class="${LB<=1?'highlight':''}"><td>迎風面</td><td>所有值</td><td class="cp-pos">+0.8</td><td>q(z)</td></tr>
    <tr class="${LB<=1?'highlight':''}"><td rowspan="3">背風面</td><td>0~1</td><td class="cp-neg">-0.5</td><td rowspan="3">q(h)</td></tr>
    <tr class="${LB>1&&LB<=2?'highlight':''}"><td>2</td><td class="cp-neg">-0.3</td></tr>
    <tr class="${LB>4?'highlight':''}"><td>≧4</td><td class="cp-neg">-0.2</td></tr>
    <tr><td>側風面</td><td>所有值</td><td class="cp-neg">-0.7</td><td>q(h)</td></tr>
  </table>
  ${(()=>{
    if(!(LB>1&&LB<4)) return '';
    const formula = LB<=2
      ? '-0.5 + (-0.3-(-0.5))/(2-1) × (' + LB.toFixed(2) + '-1) = ' + cpLee.toFixed(3)
      : '-0.3 + (-0.2-(-0.3))/(4-2) × (' + LB.toFixed(2) + '-2) = ' + cpLee.toFixed(3);
    return '<div class="note-box">⚠️ <b>內插結果</b>：L/B = ' + LB.toFixed(2) + '，背風面 Cp 由線性內插得 <b>' + cpLee.toFixed(3) + '</b><br>計算式：Cp = ' + formula + '</div>';
  })()}
  <div class="formula-box">
    <h4>設計風壓計算步驟</h4>
    <code class="formula">p_迎風面 = q(z) × G × 0.8 − qi(GCpi)</code>
    <code class="formula">p_背風面 = q(h) × G × (${cpLee.toFixed(2)}) − qi(GCpi)</code>
    <code class="formula">p_側風面 = q(h) × G × (-0.7) − qi(GCpi)</code>
    <div style="font-size:.8rem;margin-top:6px;color:#374151">G：陣風反應因子（見2.7節）；q(z)：高度z處風速壓；q(h)：平均屋頂高度處風速壓</div>
  </div>`;
}

// ===== Calc Flat/Slope Roof (Table 2.5) =====
function calcFlatRoof(){
  const h=val('inp_h'), L=val('inp_L'), theta=val('inp_theta')||0, B=val('inp_B');
  if(!h||!L) throw new Error('請輸入 h 和 L');

  const hL=h/L;

  // ── 共用：getRowCp helper ──
  const getRowCp=(row,th)=>{
    if(th===0) return {pos:row[3],neg:null};
    if(th<=15){
      if(row[4]!==null&&row[5]!==null) return {pos:row[4],neg:row[5]};
      if(row[4]!==null) return {pos:row[4],neg:null};
      return {pos:null,neg:null};
    }
    if(th<=20) return {pos:row[6],neg:null};
    if(th<=30) return {pos:row[7],neg:null};
    if(th<=40) return {pos:row[8],neg:null};
    if(th<=50) return {pos:row[9],neg:null};
    return {pos:0.01*th,neg:null};
  };

  // ── 垂直於屋脊 ──
  const rowsPerp=DB.table_2_5_roof.rows.filter(r=>r[1]==='垂直於屋脊');
  let hLRow;
  if(hL<=0.3) hLRow=rowsPerp[0];
  else if(hL<=0.5) hLRow=rowsPerp[1];
  else if(hL<=1.0) hLRow=rowsPerp[2];
  else hLRow=rowsPerp[3];
  const cpRes=getRowCp(hLRow,theta);
  const cpLee=hLRow[11];

  // ── 平行於屋脊 ──
  const hB = B && !isNaN(B) ? h/B : hL;
  const cpPara = hB<=2.5 ? -0.7 : -0.8;

  const perpNegNote = cpRes.neg!==null ? `<br><span style="color:#888;font-size:.78rem">亦需考慮：${cpRes.neg.toFixed(2)}</span>` : '';

  return `
  <div class="formula-box">
    <h4>📐 表2.5 屋頂外風壓係數 Cp（主要風力抵抗系統）</h4>
    <code class="formula">h = ${h} m，L = ${L} m，B = ${B&&!isNaN(B)?B+' m':'未輸入'}，θ = ${theta}°</code>
    <code class="formula">h/L = ${hL.toFixed(2)} → 使用列 ${hLRow[2]}${B&&!isNaN(B)?'　　h/B = '+(h/B).toFixed(2):''}</code>
  </div>

  <h3 style="font-size:.9rem;font-weight:700;color:var(--primary);margin:16px 0 8px">① 風向垂直於屋脊</h3>
  <div class="summary-grid">
    <div class="summary-card windward">
      <div class="sc-label">迎風面屋頂 Cp</div>
      <div class="sc-value">${cpRes.pos!==null?cpRes.pos.toFixed(2):'−'}${perpNegNote}</div>
      <div class="sc-formula">${cpRes.neg!==null?'*兩者均需考慮　':''} 使用 q(h)</div>
    </div>
    <div class="summary-card leeward">
      <div class="sc-label">背風面屋頂 Cp</div>
      <div class="sc-value">${cpLee.toFixed(1)}</div>
      <div class="sc-formula">所有θ及h/L值，使用 q(h)</div>
    </div>
  </div>
  <table class="result-table">
    <tr><th>h/L</th><th>θ=0°</th><th>θ=10~15°</th><th>θ=20°</th><th>θ=30°</th><th>θ=40°</th><th>θ=50°</th><th>θ≧60°</th><th>背風面</th></tr>
    ${rowsPerp.map(r=>`<tr ${r[2]===hLRow[2]?'class="highlight"':''}>
      <td>${r[2]}</td><td>${r[3]}</td>
      <td>${r[4]!==null?r[4]:''}${r[5]!==null?'<br>'+r[5]:''}</td>
      <td>${r[6]||'−'}</td><td>${r[7]||'−'}</td><td>${r[8]||'−'}</td><td>${r[9]||'−'}</td>
      <td>${r[10]}</td><td>${r[11]}</td>
    </tr>`).join('')}
  </table>
  <div class="note-box">*(1) θ=10~15°時，0.2和-0.9都要用（兩者均須設計）。負號表示風壓遠離屋面；正號表示指向屋面。</div>

  <h3 style="font-size:.9rem;font-weight:700;color:var(--primary);margin:20px 0 8px">② 風向平行於屋脊</h3>
  <div class="summary-grid">
    <div class="summary-card side">
      <div class="sc-label">迎風面及背風面 Cp</div>
      <div class="sc-value">${cpPara.toFixed(1)}</div>
      <div class="sc-formula">h/L或h/B ${hB<=2.5?'≦':'＞'} 2.5，使用 q(h)</div>
    </div>
  </div>
  <table class="result-table">
    <tr><th>條件</th><th>Cp（迎風面及背風面）</th></tr>
    <tr ${hB<=2.5?'class="highlight"':''}><td>h/L 或 h/B ≦ 2.5</td><td class="cp-neg">−0.7</td></tr>
    <tr ${hB>2.5?'class="highlight"':''}><td>h/L 或 h/B ＞ 2.5</td><td class="cp-neg">−0.8</td></tr>
  </table>

  <div class="formula-box" style="margin-top:14px">
    <h4>設計風壓公式（兩種風向均適用）</h4>
    <code class="formula">p = q(h) × G × Cp − qi(GCpi)</code>
  </div>`;
}

// ===== Calc Arch Roof (Table 2.6) =====
function calcArchRoof(){
  const archType=selVal('inp_archType');
  const rStr=document.getElementById('inp_r').value.trim();
  if(!archType) throw new Error('請選擇拱形屋頂支承形式');
  if(rStr==='') throw new Error('請輸入拱高與跨度比值 r');
  const r=parseFloat(rStr);
  if(isNaN(r)||r<=0||r>0.6) throw new Error('r 值需在 0 < r ≦ 0.6 範圍內');

  let cpWind, cpCenter;
  let formulaWind='';
  if(archType==='wall'){
    if(r<0.2){    cpWind=-0.9;         formulaWind='-0.9'; }
    else if(r<0.3){ cpWind=1.5*r-0.3; formulaWind='1.5×'+r+' − 0.3'; }
    else{          cpWind=2.75*r-0.7; formulaWind='2.75×'+r+' − 0.7'; }
  } else {
    cpWind=1.4*r; formulaWind='1.4×'+r;
  }
  cpCenter=-0.7-r;

  const tableRows=DB.table_2_6_arch.rows;
  // rows: [id, type_str, r_min, r_max, cp_wind_str, cp_center_str, cp_lee]
  const tableHTML=tableRows.map(function(row){

  return '<div class="formula-box">'

    +'<code class="formula">迎風面 Cp(P) = '+formulaWind+' = '+cpWind.toFixed(4)+'</code>'
    +'<code class="formula">中央部分 Cp(Q) = −0.7 − r = −0.7 − '+r+' = '+cpCenter.toFixed(4)+'</code>'
    +'<code class="formula">背風面 Cp(P) = −0.5</code>'
    +'</div>'
    +'<div class="summary-grid">'
    +'<div class="summary-card windward"><div class="sc-label">迎風面 P（各佔1/4跨度）</div>'
    +'<div class="sc-value '+(cpWind>=0?'cp-pos':'cp-neg')+'">'+(cpWind>=0?'+':'')+cpWind.toFixed(3)+'</div>'
    +'<div class="sc-formula">使用 q(h)</div></div>'
    +'<div class="summary-card side"><div class="sc-label">中央部分 Q（佔1/2跨度）</div>'
    +'<div class="sc-value cp-neg">'+cpCenter.toFixed(3)+'</div>'
    +'<div class="sc-formula">使用 q(h)</div></div>'
    +'<div class="summary-card leeward"><div class="sc-label">背風面 P（各佔1/4跨度）</div>'
    +'<div class="sc-value cp-neg">−0.500</div>'
    +'<div class="sc-formula">使用 q(h)</div></div>'
    +'</div>'
    +'<table class="result-table">'
    +'<tr><th>支承</th><th>r 範圍</th><th>迎風面 P 公式</th><th>中央部分 Q 公式</th><th>背風面 P</th></tr>'
    +tableHTML
    +'</table>'
    +'<div class="note-box">⚠️ <b>注意事項：</b><br>'
    +'(1) 正號：風壓指向屋頂面；負號：風壓遠離屋頂面。<br>'
    +'(2) 迎風面及背風面各佔跨度 1/4，中央部分佔 1/2。<br>'
    +'(3) 當 0.2 ≦ r ≦ 0.3 時，牆上拱形屋頂迎風面亦得以 6r − 2.1 計算（= '+alt6r+'）。<br>'
    +'(4) 局部構材設計時，Cp 值須乘以 <b>1.81</b> 倍。'
    +'</div>';
}

// ===== Calc Open Mono (Table 2.9) =====
function calcOpenMono(){
  const theta=val('inp_theta_m'), L=val('inp_L_m'), B=val('inp_B_m');
  if(!theta||!L||!B) throw new Error('請輸入 θ、L、B');
  const LB=L/B;
  const data=DB.table_2_9.data;
  const thetas=[10,15,20,25,30];
  const lbKeys=[5,3,2,1,0.5,0.333,0.2];

  // Interpolate theta
  let cf;
  const interpTheta=(th)=>{
    const lbKs=Object.keys(data[th]).map(Number);
    // Find closest LB
    let lbLow=lbKs[0],lbHigh=lbKs[lbKs.length-1];
    for(let lb of lbKs){if(lb<=LB)lbLow=lb;}
    for(let lb of lbKs.reverse()){if(lb>=LB)lbHigh=lb;}
    if(lbLow===lbHigh) return data[th][lbLow];
    return data[th][lbLow]+(data[th][lbHigh]-data[th][lbLow])/(lbHigh-lbLow)*(LB-lbLow);
  };

  let thLow=10,thHigh=30;
  for(let t of thetas){if(t<=theta)thLow=t;}
  for(let t of [...thetas].reverse()){if(t>=theta)thHigh=t;}
  if(thLow===thHigh) cf=interpTheta(thLow);
  else {
    const cfL=interpTheta(thLow), cfH=interpTheta(thHigh);
    cf=cfL+(cfH-cfL)/(thHigh-thLow)*(theta-thLow);
  }

  return `
  <div class="formula-box">
    <h4>📐 表2.9 開放式建築物單斜式屋頂風力係數 Cf</h4>
    <code class="formula">θ = ${theta}°，L = ${L} m，B = ${B} m，L/B = ${LB.toFixed(2)}</code>
    <code class="formula">Cf = ${cf.toFixed(3)} ${(thLow!==theta||LB!==Math.round(LB))?'（內插）':''}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward">
      <div class="sc-label">風力係數 Cf</div>
      <div class="sc-value">${cf.toFixed(3)}</div>
      <div class="sc-formula">向內向外均考慮</div>
    </div>
  </div>
  <table class="result-table">
    <tr><th>θ</th><th>L/B=5</th><th>L/B=3</th><th>L/B=2</th><th>L/B=1</th><th>L/B=1/2</th><th>L/B=1/3</th><th>L/B=1/5</th></tr>
    ${thetas.map(t=>`<tr ${t===thLow||t===thHigh?'class="highlight"':''}>
      <td>${t}°</td>${[5,3,2,1,0.5,0.333,0.2].map(lb=>`<td>${(data[t][lb]||'').toFixed?data[t][lb].toFixed(2):data[t][lb]||'−'}</td>`).join('')}
    </tr>`).join('')}
  </table>
  <div class="formula-box">
    <h4>設計風力公式</h4>
    <code class="formula">F = q(z_Ac) × G × Cf × Ac</code>
    <div style="font-size:.8rem;margin-top:6px;color:#374151">Ac：受風面積（屋頂面積）；z_Ac：Ac形心高度</div>
  </div>`;
}

// ===== Calc Solid Sign (Table 2.10) =====
function calcSolidSign(){
  const loc=selVal('inp_signLoc'), ratio=val('inp_signRatio');
  if(!loc||!ratio) throw new Error('請選擇位置並輸入比值');
  const data_g=[[3,1.2],[5,1.3],[8,1.4],[10,1.5],[20,1.75],[30,1.85],[40,2.0]];
  const data_e=[[6,1.2],[10,1.3],[16,1.4],[20,1.5],[40,1.75],[60,1.85],[80,2.0]];
  const arr=loc==='ground'?data_g:data_e;
  // Interpolate
  let cf;
  let lo=arr[0],hi=arr[arr.length-1];
  for(let r of arr){if(r[0]<=ratio)lo=r;}
  for(let r of [...arr].reverse()){if(r[0]>=ratio)hi=r;}
  if(lo===hi) cf=lo[1];
  else cf=lo[1]+(hi[1]-lo[1])/(hi[0]-lo[0])*(ratio-lo[0]);

  return `
  <div class="formula-box">
    <h4>📐 表2.10 實體標示物風力係數 Cf</h4>
    <code class="formula">位置：${loc==='ground'?'地面上（ν='+ratio+'）':'地面以上（M/N='+ratio+'）'}，Cf = ${cf.toFixed(2)}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward">
      <div class="sc-label">風力係數 Cf</div>
      <div class="sc-value">${cf.toFixed(2)}</div>
    </div>
  </div>
  <table class="result-table">
    <tr><th>${loc==='ground'?'高寬比 ν':'M/N'}</th><th>Cf</th></tr>
    ${arr.map(r=>`<tr ${r[0]===lo[0]||r[0]===hi[0]?'class="highlight"':''}>
      <td>${r[0]==='40'||r[0]===40&&loc==='ground'?'≧'+r[0]:r[0]==='80'||r[0]===80&&loc==='elevated'?'≧'+r[0]:r[0]}</td><td>${r[1]}</td>
    </tr>`).join('')}
  </table>`;
}

// ===== Calc Open Sign (Table 2.11) =====
function calcOpenSign(){
  const secType=selVal('inp_secType'), eps=val('inp_solidity');
  if(!secType||eps===null||isNaN(eps)) throw new Error('請選擇斷面形式並輸入實體比');
  // rows: [eps_min, eps_max, cf_flat, cf_round_low, cf_round_high]
  // 對應原表欄位順序：平邊構材 | 圓形D√q≦1.70 | 圓形D√q>1.70
  const rows=[
    [0,   0.1,  2.0, 1.2, 0.8],
    [0.1, 0.29, 1.8, 1.3, 0.9],
    [0.3, 0.7,  1.6, 1.5, 1.1]
  ];
  let row=rows.find(r=>eps>=r[0]&&eps<=r[1])||rows[rows.length-1];
  let cf;
  if(secType==='flat')       cf=row[2];   // 平邊構材
  else if(secType==='round_low')  cf=row[3];   // 圓形 D√q≦1.70
  else                       cf=row[4];   // 圓形 D√q>1.70

  const secLabel = secType==='flat'?'平邊構材':secType==='round_low'?'圓形斷面 D√q(z) ≦ 1.70':'圓形斷面 D√q(z) > 1.70';

  return `
  <div class="formula-box">
    <h4>📐 表2.11 中空式/格子式構架風力係數 Cf</h4>
    <code class="formula">ε = ${eps}，斷面形式：${secLabel}</code>
    <code class="formula">Cf = ${cf}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward"><div class="sc-label">風力係數 Cf</div><div class="sc-value">${cf}</div></div>
  </div>
  <table class="result-table">
    <tr><th>ε</th><th>平邊構材</th><th>圓形 D√q(z) ≦ 1.70</th><th>圓形 D√q(z) &gt; 1.70</th></tr>
    ${rows.map(r=>{
      const hi=(eps>=r[0]&&eps<=r[1])?'class="highlight"':'';
      return '<tr '+hi+'><td>'+r[0]+'～'+r[1]+'</td><td>'+(secType==='flat'?'<b>'+r[2]+'</b>':r[2])+'</td><td>'+(secType==='round_low'?'<b>'+r[3]+'</b>':r[3])+'</td><td>'+(secType==='round_high'?'<b>'+r[4]+'</b>':r[4])+'</td></tr>';
    }).join('')}
  </table>
  <div class="note-box">
    ε：實體面積與總面積之比值。D：圓形斷面構件直徑（m）。q(z)：風速壓（kgf/m²）。
  </div>`;
}

// ===== Calc Chimney (Table 2.12) =====
function calcChimney(){
  const shape=selVal('inp_chimShape'), h=val('inp_h_c'), D=val('inp_D_c');
  if(!shape||!h||!D) throw new Error('請完整輸入參數');
  const hD=h/D;
  const shapeMap={
    'sq_perp':{idx:0},'sq_diag':{idx:1},'hex_oct':{idx:2},
    'circ_low_smooth':{idx:3},'circ_low_rough':{idx:4},'circ_low_vrough':{idx:5},'circ_high':{idx:6}
  };
  const row=DB.table_2_12[shapeMap[shape].idx];
  // Interpolate hD: 1,7,25
  let cf;
  if(hD<=1) cf=row.cf[0];
  else if(hD<=7) cf=row.cf[0]+(row.cf[1]-row.cf[0])/(7-1)*(hD-1);
  else if(hD<=25) cf=row.cf[1]+(row.cf[2]-row.cf[1])/(25-7)*(hD-7);
  else cf=row.cf[2];

  return `
  <div class="formula-box">
    <h4>📐 表2.12 煙囪、水塔風力係數 Cf</h4>
    <code class="formula">h = ${h} m，D = ${D} m，h/D = ${hD.toFixed(2)}</code>
    <code class="formula">形狀：${row.shape}，表面：${row.surf}</code>
    <code class="formula">Cf = ${cf.toFixed(3)} ${hD!==1&&hD!==7&&hD!==25?'（內插）':''}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward"><div class="sc-label">風力係數 Cf</div><div class="sc-value">${cf.toFixed(3)}</div></div>
  </div>
  <table class="result-table">
    <tr><th>形狀</th><th>表面</th><th>h/D=1</th><th>h/D=7</th><th>h/D=25</th></tr>
    ${DB.table_2_12.map((r,i)=>`<tr ${i===shapeMap[shape].idx?'class="highlight"':''}>
      <td>${r.shape}</td><td>${r.surf}</td><td>${r.cf[0]}</td><td>${r.cf[1]}</td><td>${r.cf[2]}</td>
    </tr>`).join('')}
  </table>`;
}

// ===== Calc Prism (Table 2.13) =====
function calcPrism(){
  const shape=selVal('inp_prismShape'), h=val('inp_h_p'), D=val('inp_D_p');
  if(!shape||!h||!D) throw new Error('請完整輸入參數');
  const cfMap={rect_long:2.2,rect_short:1.4,tri_vert:1.2,tri_face:2.0,right_tri:1.55};
  const cf=cfMap[shape];
  const ratio=2*h/D;
  let R;
  if(ratio<=4) R=0.6;
  else if(ratio<=8) R=0.7;
  else if(ratio<=40) R=0.8;
  else R=1.0;
  const cfFinal=cf*R;

  return `
  <div class="formula-box">
    <h4>📐 表2.13 角柱體風力係數 Cf 及修正係數 R</h4>
    <code class="formula">形狀：${shape}，h = ${h} m，D = ${D} m</code>
    <code class="formula">2h/D = ${ratio.toFixed(2)}，基本 Cf = ${cf}，R = ${R}</code>
    <code class="formula">設計風力係數 = Cf × R = ${cf} × ${R} = ${cfFinal.toFixed(3)}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward"><div class="sc-label">Cf（基本）</div><div class="sc-value">${cf}</div></div>
    <div class="summary-card side"><div class="sc-label">修正係數 R</div><div class="sc-value">${R}</div></div>
    <div class="summary-card internal"><div class="sc-label">Cf × R</div><div class="sc-value">${cfFinal.toFixed(3)}</div></div>
  </div>`;
}

// ===== Calc Truss (Table 2.15) =====
function calcTruss(){
  const shape=selVal('inp_trussShape'), eps=val('inp_solidity_t');
  if(!shape||isNaN(eps)) throw new Error('請完整輸入參數');
  let cf;
  if(eps<0.025) cf=shape==='square'?4.0:3.6;
  else if(eps<=0.44) cf=shape==='square'?(4.1-5.2*eps):(3.7-4.5*eps);
  else if(eps<=0.69) cf=shape==='square'?1.8:1.7;
  else cf=shape==='square'?(1.3+0.7*eps):(1.0+eps);

  return `
  <div class="formula-box">
    <h4>📐 表2.15 桁架高塔風力係數 Cf</h4>
    <code class="formula">形狀：${shape==='square'?'方形':'三角形'}高塔，ε = ${eps}</code>
    <code class="formula">Cf = ${cf.toFixed(3)}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward"><div class="sc-label">風力係數 Cf</div><div class="sc-value">${cf.toFixed(3)}</div></div>
  </div>
  <table class="result-table">
    <tr><th>ε 範圍</th><th>方形高塔 Cf</th><th>三角形高塔 Cf</th></tr>
    <tr ${eps<0.025?'class="highlight"':''}><td>&lt; 0.025</td><td>4.0</td><td>3.6</td></tr>
    <tr ${eps>=0.025&&eps<=0.44?'class="highlight"':''}><td>0.025～0.44</td><td>4.1-5.2ε</td><td>3.7-4.5ε</td></tr>
    <tr ${eps>0.44&&eps<=0.69?'class="highlight"':''}><td>0.45～0.69</td><td>1.8</td><td>1.7</td></tr>
    <tr ${eps>0.69?'class="highlight"':''}><td>0.70～1.0</td><td>1.3+0.7ε</td><td>1.0+ε</td></tr>
  </table>`;
}

// ===== Calc Guy Wire (Table 2.16) =====
function calcGuyWire(){
  const theta=val('inp_theta_g');
  if(!theta) throw new Error('請輸入角度 θ');
  const data=DB.table_2_16;
  let lo=data[0],hi=data[data.length-1];
  for(let r of data){if(r.theta<=theta)lo=r;}
  for(let r of [...data].reverse()){if(r.theta>=theta)hi=r;}
  let cd,cl;
  if(lo.theta===hi.theta){cd=lo.cd;cl=lo.cl;}
  else {
    cd=lo.cd+(hi.cd-lo.cd)/(hi.theta-lo.theta)*(theta-lo.theta);
    cl=lo.cl+(hi.cl-lo.cl)/(hi.theta-lo.theta)*(theta-lo.theta);
  }

  return `
  <div class="formula-box">
    <h4>📐 表2.16 高塔拉固索風力係數</h4>
    <code class="formula">θ = ${theta}°</code>
    <code class="formula">CD = ${cd.toFixed(3)}，CL = ${cl.toFixed(3)} ${lo.theta!==theta?'（內插）':''}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card windward"><div class="sc-label">順風向 CD</div><div class="sc-value">${cd.toFixed(3)}</div></div>
    <div class="summary-card side"><div class="sc-label">橫風向 CL</div><div class="sc-value">${cl.toFixed(3)}</div></div>
  </div>
  <table class="result-table">
    <tr><th>θ（度）</th><th>CD</th><th>CL</th></tr>
    ${data.map(r=>`<tr ${r.theta===lo.theta||r.theta===hi.theta?'class="highlight"':''}><td>${r.theta}</td><td>${r.cd}</td><td>${r.cl}</td></tr>`).join('')}
  </table>`;
}

// ===== Calc Internal (Table 2.17) =====
function calcInternal(){
  const row=DB.table_2_17.find(r=>
    (currentBuilding==='enclosed'&&r.type==='封閉式建築')||
    (currentBuilding==='partial'&&r.type==='部分封閉式建築')||
    (currentBuilding==='open'&&r.type==='開放式建築')
  );
  return `
  <div class="formula-box">
    <h4>📐 表2.17 內風壓係數（GCpi）</h4>
    <code class="formula">建築物類型：${row.type}</code>
  </div>
  <div class="summary-grid">
    <div class="summary-card internal">
      <div class="sc-label">正內風壓</div>
      <div class="sc-value" style="color:#4f46e5">+${row.pos.toFixed(3)}</div>
      <div class="sc-formula">所有牆內面均為正值</div>
    </div>
    <div class="summary-card internal">
      <div class="sc-label">負內風壓</div>
      <div class="sc-value" style="color:#4f46e5">${row.neg.toFixed(3)}</div>
      <div class="sc-formula">所有牆內面均為負值</div>
    </div>
  </div>
  <table class="result-table">
    <tr><th>建築物形式</th><th>(GCpi) 正值</th><th>(GCpi) 負值</th></tr>
    ${DB.table_2_17.map(r=>`<tr ${r.type===row.type?'class="highlight"':''}>
      <td>${r.type}</td><td class="cp-pos">+${r.pos.toFixed(3)}</td><td class="cp-neg">${r.neg.toFixed(3)}</td>
    </tr>`).join('')}
  </table>
  <div class="note-box">下面兩種情況須分別考慮：<br>
    (1) 所有牆內面之(GCpi)為正值：+${row.pos.toFixed(3)}<br>
    (2) 所有牆內面之(GCpi)為負值：${row.neg.toFixed(3)}
  </div>
  <div class="formula-box">
    <h4>設計風壓公式</h4>
    <code class="formula">p = q·G·Cp − qi·(GCpi)</code>
    <div style="font-size:.8rem;margin-top:6px;color:#374151">
      qi：封閉式建築使用q(h)；<br>
      部分封閉式（正值GCpi）：使用q(zh0)（zh0為影響正值內風壓之最高開口高度）；<br>
      部分封閉式（負值GCpi）：使用q(h)
    </div>
  </div>`;
}

function resetAll(){
  // systemType/buildingType 由 0 區永久鎖定，重置只清除後續步驟
  currentComponent='';
  document.getElementById('buildingNote').style.display='none';
  document.getElementById('buildingDiag').style.display='none';
  document.getElementById('card2').style.display='none';
  document.getElementById('card3').style.display='none';
  document.getElementById('resultCard').classList.remove('show');
  setStep(1);
  // 若 zone0 已有資料，重新套用 buildingType UI
  if (zone0Data) applyZone0ToE(zone0Data);
}

// ── Zone 0 鎖定函數 ──────────────────────────────────────────────
function applyZone0ToE(d) {
  zone0Data = d;
  if (!d.designSystem && !d.buildingForm) return;

  // 填入值（select 已在 HTML 中永久 disabled）
  const st = document.getElementById('systemType');
  if (d.designSystem) {
    st.value = d.designSystem;
    currentSystemType = d.designSystem;
    document.getElementById('buildingTypeWrap').style.display = 'block';
    document.getElementById('card2').style.display = 'none';
    document.getElementById('card3').style.display = 'none';
    document.getElementById('resultCard').classList.remove('show');
  }

  const bt = document.getElementById('buildingType');
  if (d.buildingForm) {
    bt.value = d.buildingForm;
    onBuildingTypeChange();
  }
}

function applyZone0Inputs() {
  if (!zone0Data) return;
  const map = { inp_h: zone0Data.h, inp_L: zone0Data.L, inp_B: zone0Data.B };
  for (const [id, val] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (el && val !== undefined && val !== '') {
      el.value = val;
      el.readOnly = true;
      el.style.background = '#f0ece0';
      el.style.color = '#888070';
      el.style.cursor = 'not-allowed';
      el.title = '由 0 區自動帶入並鎖定';
    }
  }
}

// ── Zone 0 postMessage 監聽 ──────────────────────────────────────
window.addEventListener('message', function(ev) {
  const d = ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.source === 'hub_to_e_zone0') applyZone0ToE(d);
});
</script>
